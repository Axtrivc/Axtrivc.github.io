# --------------------------------------
# Hexo Butterfly Theme Configuration
# --------------------------------------

# Navigation
nav:
  logo:
  display_title: true
  display_post_title: true
  fixed: false

menu:
  Home: / || fas fa-home
  Archives: /archives/ || fas fa-archive
  Tags: /tags/ || fas fa-tags
  Categories: /categories/ || fas fa-folder-open
  西班牙语: /espanol/ || fas fa-language
  足球日报: /football/ || fas fa-futbol
  歌单: /music/ || fas fa-music
  留言板: /guestbook/ || fas fa-comment-dots
  工具箱: /tools/ || fas fa-tools

# Code Blocks
code_blocks:
  theme: light
  macStyle: false
  height_limit: false
  word_wrap: false
  copy: true
  language: true
  shrink: false
  fullpage: false

# Social media links
social:

# Image Settings
favicon:

avatar:
  img:
  effect: false

disable_top_img: false
default_top_img:
index_img:

# Website Background - warm beige tone
background: '#f5f0e8'

cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  default_cover:

error_img:
  flink: /img/friend_404.gif
  post_page: /img/404.jpg

error_404:
  enable: false
  subtitle: 'Page Not Found'
  background: /img/error-page.png

post_meta:
  page:
    date_type: created
    date_format: date
    categories: true
    tags: false
    label: true
  post:
    position: left
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true

# Index page settings
index_site_info_top:
index_top_img_height:

# Subtitle with typewriter effect
subtitle:
  enable: true
  effect: true
  source: 1
  sub:
    - '生活不止眼前的代码'
    - '还有远方的诗和球场'
    - '记录每一个灵光乍现的瞬间'

# Article layout - masonry style (6)
index_layout: 6

index_post_content:
  method: 3
  length: 500

# Post Settings
toc:
  post: true
  page: false
  number: true
  expand: false
  style_simple: false
  scroll_percent: true

post_copyright:
  enable: true
  decode: false
  author_href:
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

reward:
  enable: false

post_edit:
  enable: false

related_post:
  enable: true
  limit: 6
  date_type: created

post_pagination: 1

noticeOutdate:
  enable: false

# Footer Settings
footer:
  nav:
  owner:
    enable: true
    since: 2026
  copyright:
    enable: true
    version: true
  custom_text:

# Aside Settings
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right

# -------------------------------------------------------
# Butterfly theme color scheme - warm literary style
# -------------------------------------------------------
theme_color:
  enable: true
  main: '#8B6F47'
  paginator: '#A0845C'
  button_hover: '#C4A96A'
  text_selection: '#E8D5B5'

# -------------------------------------------------------
# Local Search
# -------------------------------------------------------
local_search:
  enable: true
  preload: false
  CDN:

# -------------------------------------------------------
# Footer special effects
# -------------------------------------------------------
footer_bg: false

# -------------------------------------------------------
# Tag & Category settings
# -------------------------------------------------------
tagcloud:
  enable: true
  max_result: 20

# -------------------------------------------------------
# Article meta display
# -------------------------------------------------------
auto_excerpt:
  enable: false
  length: 150

# Read mode
readmode: true

# -------------------------------------------------------
# CDN settings
# -------------------------------------------------------
CDN:
  css:
  js:
  images:
  image:
  cdnjs:
  combine: false

# -------------------------------------------------------
# Lazyload
# -------------------------------------------------------
lazyload:
  enable: true
  field: site
  blur: false
  opacity: false
  placeholder:

# -------------------------------------------------------
# Pagination
# -------------------------------------------------------
pagination:
  style: normal
  show_info: true
  subject: ''
  separator: '|'

# -------------------------------------------------------
# Inject custom CSS/HTML for literary style
# -------------------------------------------------------
inject:
  head:
    - <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=LXGW+WenKai+Screen&display=swap" rel="stylesheet">
    - |
      <style>
      #music-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 52px; background: rgba(245,240,232,0.92); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-top: 1px solid rgba(139,111,71,0.12); z-index: 9999; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); box-shadow: 0 -2px 20px rgba(139,111,71,0.08); }
      #music-bar .bar-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
      #music-bar .bar-cover { width: 36px; height: 36px; border-radius: 8px; background: linear-gradient(135deg, #8B6F47 0%, #C4A96A 100%); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; box-shadow: 0 2px 8px rgba(139,111,71,0.2); }
      #music-bar .bar-info { min-width: 0; }
      #music-bar .bar-title { font-size: 13px; font-weight: 600; color: #4a3728; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
      #music-bar .bar-sub { font-size: 11px; color: #a09080; }
      #music-bar .bar-controls { display: flex; align-items: center; gap: 8px; }
      .bar-btn { width: 36px; height: 36px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; font-size: 14px; background: transparent; color: #8B6F47; }
      .bar-btn:hover { background: rgba(139,111,71,0.1); }
      #music-bar .bar-btn-toggle { width: 32px; height: 32px; border-radius: 50%; background: #8B6F47; color: #fff; font-size: 12px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
      #music-bar .bar-btn-toggle:hover { background: #A0845C; transform: scale(1.05); }
      #music-panel { position: fixed; bottom: 52px; right: 20px; width: 340px; border-radius: 16px; overflow: hidden; box-shadow: 0 8px 40px rgba(139,111,71,0.18); z-index: 9998; transform: translateY(20px) scale(0.95); opacity: 0; pointer-events: none; transition: all 0.35s cubic-bezier(0.4,0,0.2,1); background: rgba(245,240,232,0.95); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(139,111,71,0.12); }
      #music-panel.show { transform: translateY(0) scale(1); opacity: 1; pointer-events: auto; }
      #music-panel .panel-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 8px; }
      #music-panel .panel-header span { font-size: 13px; font-weight: 600; color: #4a3728; }
      #music-panel .panel-header button { background: none; border: none; cursor: pointer; color: #a09080; font-size: 16px; padding: 4px; transition: color 0.2s; }
      #music-panel .panel-header button:hover { color: #4a3728; }
      #spotify-embed { border-radius: 0 0 16px 16px; }
      body { padding-bottom: 52px !important; }
      @media (max-width: 480px) {
        #music-bar .bar-title { max-width: 140px; }
        #music-panel { width: calc(100vw - 32px); right: 16px; }
        #music-bar { padding: 0 16px; }
      }
      .vinyl-spin { animation: vinyl-rotate 4s linear infinite paused; }
      .vinyl-spin.playing { animation-play-state: running; }
      @keyframes vinyl-rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      /* Birthday Countdown - placed outside .recent-post-items to avoid masonry */
      #recent-posts { display: flex; flex-direction: column; }
      .bday-countdown { max-width: 100%; margin: 0 auto 16px; padding: 14px 20px; background: linear-gradient(135deg, rgba(139,111,71,0.05) 0%, rgba(196,169,106,0.07) 100%); border-radius: 12px; border: 1px solid rgba(139,111,71,0.08); text-align: center; flex-shrink: 0; }
      .bday-countdown .bday-emoji { font-size: 20px; margin-bottom: 2px; }
      .bday-countdown .bday-label { font-size: 10px; color: #b0a090; letter-spacing: 1.5px; margin-bottom: 2px; }
      .bday-countdown .bday-name { font-size: 14px; font-weight: 600; color: #4a3728; margin-bottom: 8px; }
      .bday-countdown .bday-grid { display: flex; justify-content: center; gap: 8px; margin-bottom: 6px; }
      .bday-countdown .bday-num { display: flex; flex-direction: column; align-items: center; min-width: 44px; }
      .bday-countdown .bday-num .num { font-size: 20px; font-weight: 700; color: #8B6F47; font-variant-numeric: tabular-nums; line-height: 1.1; }
      .bday-countdown .bday-num .unit { font-size: 10px; color: #b0a090; margin-top: 2px; }
      .bday-countdown .bday-date { font-size: 10px; color: #c4b49a; }
      .bday-countdown.today .bday-name { color: #C4A96A; }
      .bday-countdown.today .bday-label { display: none; }
      .bday-countdown.today .bday-grid { display: none; }
      </style>
  bottom:
    - |
      <div id="music-bar">
        <div class="bar-left">
          <div class="bar-cover" id="vinyl-icon">🎵</div>
          <div class="bar-info">
            <div class="bar-title">My Playlist</div>
            <div class="bar-sub">点击右侧按钮播放 ♪</div>
          </div>
        </div>
        <div class="bar-controls">
          <button class="bar-btn" id="btn-link" onclick="window.open('https://open.spotify.com/playlist/6T6g0jNwBR1YLNfCO5miEo','_blank')" title="在 Spotify 中打开">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
          </button>
          <button class="bar-btn-toggle" id="btn-toggle" onclick="togglePlayer()" title="展开/收起播放器">
            <svg id="icon-up" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 15l-6-6-6 6"/></svg>
          </button>
        </div>
      </div>
      <div id="music-panel">
        <div class="panel-header">
          <span>🎧 Now Playing</span>
          <button onclick="togglePlayer()">✕</button>
        </div>
        <iframe id="spotify-embed" src="https://open.spotify.com/embed/playlist/6T6g0jNwBR1YLNfCO5miEo?utm_source=generator&theme=0" width="340" height="152" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy" style="display:block;"></iframe>
      </div>
      <script>
      (function() {
        let panelOpen = false;
        let isPlaying = false;
        const panel = document.getElementById('music-panel');
        const bar = document.getElementById('music-bar');
        const btnToggle = document.getElementById('btn-toggle');
        const iconUp = document.getElementById('icon-up');
        const vinyl = document.getElementById('vinyl-icon');
        const barSub = document.querySelector('.bar-sub');

        window.togglePlayer = function() {
          panelOpen = !panelOpen;
          if (panelOpen) {
            panel.classList.add('show');
            iconUp.innerHTML = '<path d="M6 9l6 6 6-6"/>';
            barSub.textContent = '点击播放 ♪';
          } else {
            panel.classList.remove('show');
            iconUp.innerHTML = '<path d="M18 15l-6-6-6 6"/>';
          }
        };

        // Listen for Spotify embed messages (play/pause state)
        window.addEventListener('message', function(e) {
          if (e.data && e.data.type === 'SPOTIFY_FRAME_MESSAGE') {
            try {
              const payload = typeof e.data.payload === 'string' ? JSON.parse(e.data.payload) : e.data.payload;
              if (payload && payload.data && payload.data.is_playing !== undefined) {
                isPlaying = payload.data.is_playing;
                if (isPlaying) {
                  vinyl.classList.add('playing');
                  vinyl.textContent = '🎶';
                  barSub.textContent = '正在播放...';
                } else {
                  vinyl.classList.remove('playing');
                  vinyl.textContent = '🎵';
                  barSub.textContent = '已暂停';
                }
              }
            } catch(err) {}
          }
        });

        // Close panel when clicking outside
        document.addEventListener('click', function(e) {
          if (panelOpen && !panel.contains(e.target) && !btnToggle.contains(e.target)) {
            panelOpen = false;
            panel.classList.remove('show');
            iconUp.innerHTML = '<path d="M18 15l-6-6-6 6"/>';
          }
        });
      })();
      </script>
      <script>
      document.addEventListener('DOMContentLoaded', function() {
        if (window.location.pathname !== '/' && window.location.pathname !== '/index.html') return;
        var bdayMonth = 5, bdayDay = 12;
        var now = new Date();
        var isToday = (now.getMonth() === bdayMonth - 1 && now.getDate() === bdayDay);

        var card = document.createElement('div');
        card.className = 'bday-countdown' + (isToday ? ' today' : '');

        if (isToday) {
          card.innerHTML = '<div class="bday-emoji">🎂🎉</div><div class="bday-name">今天是 Axtrivc 的生日！</div><div class="bday-date">5月12日 · Happy Birthday!</div>';
        } else {
          card.innerHTML = '<div class="bday-emoji">🎂</div><div class="bday-label">BIRTHDAY COUNTDOWN</div><div class="bday-name">Axtrivc 的生日</div><div class="bday-grid"><div class="bday-num"><span class="num" id="bday-d">00</span><span class="unit">天</span></div><div class="bday-num"><span class="num" id="bday-h">00</span><span class="unit">时</span></div><div class="bday-num"><span class="num" id="bday-m">00</span><span class="unit">分</span></div><div class="bday-num"><span class="num" id="bday-s">00</span><span class="unit">秒</span></div></div><div class="bday-date">5月12日</div>';
        }

        var posts = document.getElementById('recent-posts');
        var postItems = document.querySelector('.recent-post-items');
        if (posts && postItems) {
          posts.insertBefore(card, postItems);
        } else if (posts) {
          posts.insertBefore(card, posts.firstChild);
        }

        if (!isToday) {
          function pad(n) { return n < 10 ? '0' + n : '' + n; }
          function tick() {
            var n = new Date();
            var nx = new Date(n.getFullYear(), bdayMonth - 1, bdayDay);
            if (nx <= n) nx = new Date(n.getFullYear() + 1, bdayMonth - 1, bdayDay);
            var d = nx - n;
            var dd = Math.floor(d / 86400000);
            var hh = Math.floor((d % 86400000) / 3600000);
            var mm = Math.floor((d % 3600000) / 60000);
            var ss = Math.floor((d % 60000) / 1000);
            var ed = document.getElementById('bday-d');
            var eh = document.getElementById('bday-h');
            var em = document.getElementById('bday-m');
            var es = document.getElementById('bday-s');
            if (ed) ed.textContent = pad(dd);
            if (eh) eh.textContent = pad(hh);
            if (em) em.textContent = pad(mm);
            if (es) es.textContent = pad(ss);
          }
          tick();
          setInterval(tick, 1000);
        }
      });
      </script>

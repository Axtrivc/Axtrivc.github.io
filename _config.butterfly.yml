# --------------------------------------
# Hexo Butterfly Theme Configuration
# --------------------------------------

# Navigation
nav:
  logo:
  display_title: true
  display_post_title: true
  fixed: false

menu:
  Home: / || fas fa-home
  Archives: /archives/ || fas fa-archive
  Tags: /tags/ || fas fa-tags
  Categories: /categories/ || fas fa-folder-open
  西班牙语: /espanol/ || fas fa-language
  足球日报: /football/ || fas fa-futbol
  歌单: /music/ || fas fa-music
  留言板: /guestbook/ || fas fa-comment-dots
  工具箱: /tools/ || fas fa-tools

# Code Blocks
code_blocks:
  theme: light
  macStyle: false
  height_limit: false
  word_wrap: false
  copy: true
  language: true
  shrink: false
  fullpage: false

# Social media links
social:

# Image Settings
favicon:

avatar:
  img:
  effect: false

disable_top_img: false
default_top_img:
index_img:

# Website Background - white (overridden by theme system)
background: '#FFFFFF'

cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  default_cover:

error_img:
  flink: /img/friend_404.gif
  post_page: /img/404.jpg

error_404:
  enable: false
  subtitle: 'Page Not Found'
  background: /img/error-page.png

post_meta:
  page:
    date_type: created
    date_format: date
    categories: true
    tags: false
    label: true
  post:
    position: left
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true

# Index page settings
index_site_info_top:
index_top_img_height:

# Subtitle with typewriter effect
subtitle:
  enable: true
  effect: true
  source: 1
  sub:
    - '生活不止眼前的代码'
    - '还有远方的诗和球场'
    - '记录每一个灵光乍现的瞬间'

# Article layout - masonry style (6)
index_layout: 6

index_post_content:
  method: 3
  length: 500

# Post Settings
toc:
  post: true
  page: false
  number: true
  expand: false
  style_simple: false
  scroll_percent: true

post_copyright:
  enable: true
  decode: false
  author_href:
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

reward:
  enable: false

post_edit:
  enable: false

related_post:
  enable: true
  limit: 6
  date_type: created

post_pagination: 1

noticeOutdate:
  enable: false

# Footer Settings
footer:
  nav:
  owner:
    enable: true
    since: 2026
  copyright:
    enable: true
    version: true
  custom_text:

# Aside Settings
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right

# -------------------------------------------------------
# Butterfly theme color scheme - warm literary style
# -------------------------------------------------------
theme_color:
  enable: true
  main: '#8B6F47'
  paginator: '#A0845C'
  button_hover: '#C4A96A'
  text_selection: '#E8D5B5'

# -------------------------------------------------------
# Local Search
# -------------------------------------------------------
local_search:
  enable: true
  preload: false
  CDN:

# -------------------------------------------------------
# Footer special effects
# -------------------------------------------------------
footer_bg: false

# -------------------------------------------------------
# Tag & Category settings
# -------------------------------------------------------
tagcloud:
  enable: true
  max_result: 20

# -------------------------------------------------------
# Article meta display
# -------------------------------------------------------
auto_excerpt:
  enable: false
  length: 150

# Read mode
readmode: true

# -------------------------------------------------------
# CDN settings
# -------------------------------------------------------
CDN:
  css:
  js:
  images:
  image:
  cdnjs:
  combine: false

# -------------------------------------------------------
# Lazyload
# -------------------------------------------------------
lazyload:
  enable: true
  field: site
  blur: false
  opacity: false
  placeholder:

# -------------------------------------------------------
# Pagination
# -------------------------------------------------------
pagination:
  style: normal
  show_info: true
  subject: ''
  separator: '|'

# -------------------------------------------------------
# Inject custom CSS/HTML for literary style
# -------------------------------------------------------
inject:
  head:
    - <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=LXGW+WenKai+Screen&display=swap" rel="stylesheet">
    - <link rel="stylesheet" href="/css/theme-system.css?v=20260621b">
    - <link rel="stylesheet" href="/css/publish-button.css?v=20260621a">
    - <link rel="stylesheet" href="/css/hide-rightside.css?v=20260621a">
    - <link rel="stylesheet" href="/css/music-bar.css?v=20260621a">
    - <link rel="stylesheet" href="/css/birthday-countdown.css?v=20260621a">
  bottom:
    - |
      <div id="music-bar">
        <div class="bar-left">
          <div class="bar-cover" id="vinyl-icon">🎵</div>
          <div class="bar-info">
            <div class="bar-title" id="bar-title">My Playlist</div>
            <div class="bar-sub">点击右侧按钮播放 ♪</div>
          </div>
        </div>
        <div class="bar-controls">
          <button class="bar-btn" id="btn-link" title="在 Spotify 中打开">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
          </button>
          <button class="bar-btn-toggle" id="btn-toggle" onclick="togglePlayer()" title="展开/收起播放器">
            <svg id="icon-up" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 15l-6-6-6 6"/></svg>
          </button>
        </div>
      </div>
      <div id="music-panel">
        <div class="panel-header">
          <span>🎧 Now Playing</span>
          <button onclick="togglePlayer()">✕</button>
        </div>
        <div id="player-embed-container"></div>
      </div>
    - <script src="/js/music-bar.js?v=20260621a"></script>
    - <script src="/js/birthday-countdown.js?v=20260621a"></script>
    - <script src="/js/theme-system.js?v=20260621e"></script>
    - <script src="/js/publish-button.js?v=20260621a"></script>
    - <script src="/js/dynamic-avatar.js?v=20260621a"></script>

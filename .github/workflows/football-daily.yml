name: Football Daily Update

on:
  schedule:
    # 每天 UTC 0:00（北京时间 8:00）运行
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run football daily generator
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          POSTS_DIR: ${{ github.workspace }}/source/_posts
        run: node scripts/football-daily.js

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet source/_posts/football-daily-*.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add source/_posts/football-daily-*.md
          git commit -m "⚽ 足球日报自动更新 - $(date +%Y-%m-%d)"
          git push

      - name: No changes
        if: steps.changes.outputs.changed == 'false'
        run: echo "No changes to push"

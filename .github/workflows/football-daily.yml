name: Football Daily Update

on:
  schedule:
    # 早报：UTC 0:00（北京时间 8:00）
    - cron: '0 0 * * *'
    # 晚报：UTC 12:00（北京时间 20:00）
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      edition:
        description: '早报(morning) 或 晚报(evening)'
        required: false
        default: 'morning'
        type: choice
        options:
          - morning
          - evening

jobs:
  morning:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # 定时早报只在 UTC 0:00 触发；手动触发根据选择
    if: |
      (github.event.schedule == '0 0 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.edition == 'morning') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.edition == '')

    steps:
      - name: Checkout source (master branch)
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run morning generator
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          POSTS_DIR: ${{ github.workspace }}/source/_posts
          EDITION: morning
        run: node scripts/football-daily.js

      - name: Commit and push source
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add source/_posts/football-morning-*.md || true
          if git diff --cached --quiet; then
            echo "No changes for morning edition"
          else
            git commit -m "⚽ 足球早报自动更新 - $(date +%Y-%m-%d)"
            git push
          fi

      - name: Configure git for deploy
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build and deploy
        env:
          HEXO_DEPLOYER_REPO: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Axtrivc/Axtrivc.github.io.git
        run: npx hexo clean && npx hexo generate && npx hexo deploy

  evening:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: |
      (github.event.schedule == '0 12 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.edition == 'evening')

    steps:
      - name: Checkout source (master branch)
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run evening generator
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          POSTS_DIR: ${{ github.workspace }}/source/_posts
          EDITION: evening
        run: node scripts/football-daily.js

      - name: Commit and push source
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add source/_posts/football-evening-*.md || true
          if git diff --cached --quiet; then
            echo "No changes for evening edition"
          else
            git commit -m "🌙 足球晚报自动更新 - $(date +%Y-%m-%d)"
            git push
          fi

      - name: Configure git for deploy
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build and deploy
        env:
          HEXO_DEPLOYER_REPO: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Axtrivc/Axtrivc.github.io.git
        run: npx hexo clean && npx hexo generate && npx hexo deploy

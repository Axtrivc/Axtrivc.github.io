<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>西班牙语学习中心 · Axtrivc's Blog</title>
<script src="/js/standalone-theme.js"></script>
<style>
  /* ============================================================
     西班牙语学习中心 v2 - 单列流式布局
     字重对齐首页：body 600 / 标题 700-800 / label 500
     ============================================================ */
  :root {
    --es-red: #c0392b;
    --es-orange: #e07b39;
    --es-soft: rgba(224,123,57,0.10);
    --green-ok: #16a34a;
    --red-wrong: #dc2626;
    --r-sm: 8px;
    --r-md: 12px;
    --r-lg: 16px;
    --max-w: 760px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--theme-body);
    color: var(--theme-text);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Segoe UI", sans-serif;
    font-size: 15px;
    font-weight: 500;
    line-height: 1.65;
    min-height: 100vh;
    transition: background 0.45s ease, color 0.45s ease;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── 顶部导航 ─── */
  .top-nav {
    background: var(--theme-card);
    border-bottom: 1px solid var(--theme-border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(8px);
    transition: background 0.45s ease, border-color 0.45s ease;
  }
  .top-nav a {
    color: var(--theme-secondary);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: color 0.2s;
  }
  .top-nav a:hover { color: var(--theme-accent); }
  .top-nav .nav-sep { color: var(--theme-border); }
  .top-nav .nav-current {
    color: var(--theme-heading);
    font-size: 15px;
    font-weight: 700;
  }
  .top-nav .nav-right {
    margin-left: auto;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .tts-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 99px;
    border: 1px solid var(--theme-border);
    background: transparent;
    color: var(--theme-secondary);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tts-pill:hover { color: var(--theme-text); border-color: var(--theme-secondary); }
  .tts-pill.active {
    background: var(--theme-accent);
    border-color: var(--theme-accent);
    color: #fff;
  }

  /* ─── 容器 ─── */
  .container {
    max-width: var(--max-w);
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ─── Hero ─── */
  .hero {
    padding: 56px 0 32px;
    border-bottom: 1px solid var(--theme-border);
    margin-bottom: 8px;
  }
  .hero .hero-emoji {
    font-size: 32px;
    line-height: 1;
    margin-bottom: 16px;
    display: block;
  }
  .hero h1 {
    font-size: 38px;
    font-weight: 800;
    letter-spacing: -0.025em;
    color: var(--theme-heading);
    margin-bottom: 8px;
    line-height: 1.15;
  }
  .hero .hero-sub {
    font-size: 15px;
    font-weight: 500;
    color: var(--theme-secondary);
    margin-bottom: 20px;
  }
  .hero .progress-line {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    font-weight: 600;
    color: var(--theme-secondary);
  }
  .progress-track {
    flex: 1;
    height: 6px;
    background: color-mix(in srgb, var(--theme-secondary) 18%, transparent);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--theme-accent);
    border-radius: 99px;
    transition: width .5s ease;
  }

  /* ─── 等级选择横条 ─── */
  .level-row {
    display: flex;
    gap: 8px;
    padding: 24px 0 16px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .level-row::-webkit-scrollbar { display: none; }
  .level-chip {
    flex-shrink: 0;
    padding: 8px 16px;
    border-radius: 99px;
    border: 1px solid var(--theme-border);
    background: transparent;
    color: var(--theme-secondary);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .level-chip:hover {
    color: var(--theme-text);
    border-color: var(--theme-secondary);
  }
  .level-chip.active {
    background: var(--theme-heading);
    border-color: var(--theme-heading);
    color: var(--theme-card);
  }
  .level-chip .chip-pct {
    font-size: 11px;
    opacity: 0.7;
    font-weight: 600;
  }

  /* ─── 单元卡片（流式核心） ─── */
  .units-flow {
    padding: 8px 0 40px;
  }
  .unit-card {
    background: var(--theme-card);
    border: 1px solid var(--theme-border);
    border-radius: var(--r-lg);
    margin-bottom: 14px;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .unit-card:hover {
    border-color: var(--theme-secondary);
    box-shadow: 0 4px 16px rgba(0,0,0,0.05);
  }
  .unit-card.done {
    border-left: 3px solid var(--green-ok);
  }
  .unit-card.active {
    border-color: var(--theme-accent);
    box-shadow: 0 4px 24px color-mix(in srgb, var(--theme-accent) 18%, transparent);
  }

  .unit-head {
    padding: 18px 22px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    user-select: none;
  }
  .unit-emoji {
    font-size: 24px;
    flex-shrink: 0;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--es-soft);
    border-radius: var(--r-sm);
  }
  .unit-info { flex: 1; min-width: 0; }
  .unit-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--theme-heading);
    letter-spacing: -0.01em;
    margin-bottom: 2px;
  }
  .unit-desc {
    font-size: 13px;
    font-weight: 500;
    color: var(--theme-secondary);
  }
  .unit-toggle {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--theme-secondary);
    font-size: 14px;
    transition: transform 0.2s;
  }
  .unit-card.active .unit-toggle { transform: rotate(90deg); }
  .unit-done-mark {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--green-ok);
    color: #fff;
    font-size: 11px;
    display: none;
    align-items: center;
    justify-content: center;
    font-weight: 800;
  }
  .unit-card.done .unit-done-mark { display: flex; }

  .unit-body {
    display: none;
    padding: 0 22px 22px;
    border-top: 1px solid var(--theme-border);
    margin-top: 0;
  }
  .unit-card.active .unit-body { display: block; }
  .unit-body > * + * { margin-top: 24px; }

  /* ─── 区块标题 ─── */
  .blk-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--theme-secondary);
    margin: 18px 0 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .blk-label:first-child { margin-top: 18px; }

  /* ─── 发音表 ─── */
  .phoneme-row {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
    gap: 8px;
  }
  .phoneme-tile {
    background: var(--theme-body);
    border: 1px solid var(--theme-border);
    border-radius: var(--r-sm);
    padding: 12px 8px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
  }
  .phoneme-tile:hover {
    border-color: var(--theme-accent);
    background: var(--theme-card);
    transform: translateY(-1px);
  }
  .phoneme-letter {
    font-size: 22px;
    font-weight: 800;
    color: var(--es-red);
    line-height: 1;
  }
  .phoneme-ipa {
    font-size: 12px;
    font-weight: 500;
    color: var(--theme-secondary);
    margin-top: 4px;
  }
  .phoneme-ex {
    font-size: 11px;
    color: var(--theme-secondary);
    margin-top: 2px;
    font-style: italic;
    opacity: 0.85;
  }

  /* ─── 对话 ─── */
  .dialog-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .dialog-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .dialog-av {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--es-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .dialog-bx {
    flex: 1;
    background: var(--theme-body);
    border-radius: var(--r-md);
    padding: 10px 14px;
    min-width: 0;
  }
  .dialog-es {
    font-size: 15px;
    font-weight: 700;
    color: var(--es-red);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .dialog-zh {
    font-size: 13px;
    font-weight: 500;
    color: var(--theme-secondary);
    margin-top: 4px;
  }

  /* ─── 语法表 ─── */
  .grammar-tbl {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    border-radius: var(--r-md);
    overflow: hidden;
    border: 1px solid var(--theme-border);
  }
  .grammar-tbl th {
    background: var(--es-soft);
    color: var(--es-red);
    padding: 10px 14px;
    text-align: left;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-bottom: 1px solid var(--theme-border);
  }
  .grammar-tbl td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--theme-border);
    font-weight: 500;
  }
  .grammar-tbl tr:last-child td { border-bottom: none; }
  .grammar-note {
    font-size: 13px;
    font-weight: 500;
    color: var(--theme-secondary);
    line-height: 1.7;
    margin-top: 10px;
    padding: 10px 14px;
    background: var(--theme-body);
    border-radius: var(--r-sm);
    border-left: 3px solid var(--theme-accent);
  }

  /* ─── 词汇 ─── */
  .vocab-row {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 8px;
  }
  .vocab-tile {
    background: var(--theme-body);
    border: 1px solid var(--theme-border);
    border-radius: var(--r-sm);
    padding: 12px 14px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .vocab-tile:hover {
    border-color: var(--theme-accent);
    background: var(--theme-card);
    transform: translateY(-1px);
  }
  .vocab-es {
    font-size: 16px;
    font-weight: 700;
    color: var(--es-red);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }
  .vocab-zh {
    font-size: 13px;
    font-weight: 500;
    color: var(--theme-secondary);
    margin-top: 2px;
  }
  .vocab-ex {
    font-size: 12px;
    font-style: italic;
    color: var(--theme-text);
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px dashed var(--theme-border);
    display: none;
  }
  .vocab-tile.flipped .vocab-ex { display: block; }

  /* ─── TTS 按钮 ─── */
  .speak-mini {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--es-orange);
    cursor: pointer;
    font-size: 13px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .speak-mini:hover {
    background: var(--theme-accent);
    color: #fff;
  }

  /* ─── 测验 ─── */
  .quiz-box {
    background: var(--theme-body);
    border-radius: var(--r-md);
    padding: 18px 20px;
    border: 1px solid var(--theme-border);
  }
  .quiz-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--theme-secondary);
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .quiz-top .score-tag {
    background: var(--theme-card);
    padding: 3px 10px;
    border-radius: 99px;
    color: var(--theme-heading);
  }
  .quiz-q {
    font-size: 17px;
    font-weight: 700;
    color: var(--theme-heading);
    margin-bottom: 14px;
    line-height: 1.5;
  }
  .quiz-opts {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .quiz-opt {
    padding: 12px 14px;
    border-radius: var(--r-sm);
    border: 1.5px solid var(--theme-border);
    background: var(--theme-card);
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    text-align: left;
    color: var(--theme-text);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .quiz-opt:hover:not(:disabled) {
    border-color: var(--theme-secondary);
    transform: translateX(2px);
  }
  .quiz-opt.correct {
    border-color: var(--green-ok);
    background: color-mix(in srgb, var(--green-ok) 12%, var(--theme-card));
    color: var(--green-ok);
  }
  .quiz-opt.wrong {
    border-color: var(--red-wrong);
    background: color-mix(in srgb, var(--red-wrong) 10%, var(--theme-card));
    color: var(--red-wrong);
  }
  .opt-letter {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--theme-border);
    color: var(--theme-text);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 800;
    flex-shrink: 0;
  }
  .quiz-opt.correct .opt-letter { background: var(--green-ok); color: #fff; }
  .quiz-opt.wrong .opt-letter { background: var(--red-wrong); color: #fff; }

  .quiz-input {
    width: 100%;
    padding: 12px 14px;
    border-radius: var(--r-sm);
    border: 1.5px solid var(--theme-border);
    background: var(--theme-card);
    font-size: 15px;
    font-weight: 600;
    color: var(--theme-text);
    outline: none;
    transition: border 0.15s;
    font-family: inherit;
  }
  .quiz-input:focus { border-color: var(--theme-accent); }
  .quiz-input.correct { border-color: var(--green-ok); }
  .quiz-input.wrong { border-color: var(--red-wrong); }

  .quiz-feedback {
    margin-top: 12px;
    padding: 10px 14px;
    border-radius: var(--r-sm);
    font-size: 13px;
    font-weight: 600;
    display: none;
  }
  .quiz-feedback.show { display: block; }
  .quiz-feedback.correct {
    background: color-mix(in srgb, var(--green-ok) 12%, transparent);
    color: var(--green-ok);
  }
  .quiz-feedback.wrong {
    background: color-mix(in srgb, var(--red-wrong) 10%, transparent);
    color: var(--red-wrong);
  }

  .btn-primary {
    margin-top: 12px;
    padding: 10px 22px;
    border-radius: 99px;
    border: none;
    background: var(--theme-heading);
    color: var(--theme-card);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px color-mix(in srgb, var(--theme-heading) 30%, transparent);
  }

  .quiz-result-box {
    text-align: center;
    padding: 24px;
  }
  .result-num {
    font-size: 48px;
    font-weight: 800;
    color: var(--theme-accent);
    line-height: 1;
    letter-spacing: -0.03em;
  }
  .result-msg {
    font-size: 16px;
    font-weight: 700;
    color: var(--theme-heading);
    margin-top: 8px;
  }
  .result-stars {
    font-size: 22px;
    margin: 12px 0 16px;
  }

  /* ─── Footer ─── */
  .footer {
    text-align: center;
    padding: 24px;
    color: var(--theme-secondary);
    font-size: 12px;
    font-weight: 500;
    opacity: 0.6;
    border-top: 1px solid var(--theme-border);
    margin-top: 40px;
  }

  /* ─── 响应式 ─── */
  @media (max-width: 640px) {
    .container { padding: 0 16px; }
    .hero { padding: 40px 0 24px; }
    .hero h1 { font-size: 30px; }
    .unit-head { padding: 16px 18px; }
    .unit-body { padding: 0 18px 18px; }
    .top-nav { padding: 10px 14px; }
  }
</style>
</head>
<body>

<div class="top-nav">
  <a href="/">首页</a>
  <span class="nav-sep">|</span>
  <span class="nav-current">🇪🇸 西班牙语学习中心</span>
  <div class="nav-right">
    <button class="tts-pill" onclick="setSpeed(0.6,this)">慢</button>
    <button class="tts-pill active" onclick="setSpeed(0.9,this)">常</button>
    <button class="tts-pill" onclick="setSpeed(1.2,this)">快</button>
  </div>
</div>

<div class="container">

  <div class="hero">
    <span class="hero-emoji">🇪🇸</span>
    <h1>西班牙语学习中心</h1>
    <p class="hero-sub">从零基础到 C1 · 发音 · 语法 · 词汇 · 对话 · 习题</p>
    <div class="progress-line">
      <span id="globalProgressText">加载中...</span>
      <div class="progress-track"><div class="progress-fill" id="globalProgress" style="width:0%"></div></div>
    </div>
  </div>

  <div class="level-row" id="levelTabs"></div>

  <div class="units-flow" id="unitsFlow"></div>

</div>

<div class="footer">© Axtrivc · 🇪🇸 西班牙语学习中心 · A1→C1 完整体系</div>

<script src="data/courses-a1.js"></script>
<script src="data/courses-a2.js"></script>
<script src="data/courses-b1.js"></script>
<script src="data/courses-b2.js"></script>
<script src="data/courses-c1.js"></script>

<script>
// ════════════════════════════════════════════════════════════
// App State
// ════════════════════════════════════════════════════════════
let ttsRate = 0.9;
let currentLevel = 'A1';
let activeUnitIdx = null;  // null = none expanded
const quizStates = {};      // unitIdx -> { idx, score, answered }

const COURSE_MAP = {
  A1: typeof COURSES_A1 !== 'undefined' ? COURSES_A1 : null,
  A2: typeof COURSES_A2 !== 'undefined' ? COURSES_A2 : null,
  B1: typeof COURSES_B1 !== 'undefined' ? COURSES_B1 : null,
  B2: typeof COURSES_B2 !== 'undefined' ? COURSES_B2 : null,
  C1: typeof COURSES_C1 !== 'undefined' ? COURSES_C1 : null,
};

function getAllLevels() { return ['A1','A2','B1','B2','C1']; }
function getLevelCourse(lv) { return COURSE_MAP[lv]; }
function getLevelPct(lv) {
  const c = getLevelCourse(lv);
  if (!c || !c.units.length) return 0;
  const done = c.units.filter(u => u.done).length;
  return Math.round(done / c.units.length * 100);
}
function getProgress() {
  let total = 0, done = 0;
  getAllLevels().forEach(lv => {
    const c = getLevelCourse(lv);
    if (c) { c.units.forEach(u => { total++; if(u.done) done++; }); }
  });
  return { total, done, pct: total ? Math.round(done/total*100) : 0 };
}

// ── TTS ──
function setSpeed(r, btn) {
  ttsRate = r;
  document.querySelectorAll('.tts-pill').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
}
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'es-ES';
  u.rate = ttsRate;
  window.speechSynthesis.speak(u);
}
function speakBtn(text) {
  const safe = text.replace(/'/g, "\\'").split(' ')[0];
  return '<button class="speak-mini" onclick="speak(\'' + safe + '\')" title="听发音">🔊</button>';
}

// ── Level Tabs ──
function renderLevelTabs() {
  const el = document.getElementById('levelTabs');
  let html = '';
  getAllLevels().forEach(lv => {
    const c = getLevelCourse(lv);
    if (!c) return;
    const pct = getLevelPct(lv);
    html += '<button class="level-chip' + (lv===currentLevel?' active':'') + '" onclick="switchLevel(\'' + lv + '\')">';
    html += lv + ' <span class="chip-pct">' + pct + '%</span>';
    html += '</button>';
  });
  el.innerHTML = html;
}

function switchLevel(lv) {
  currentLevel = lv;
  activeUnitIdx = null;
  renderAll();
  // 滚动回顶部
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Units Flow ──
function renderUnitsFlow() {
  const el = document.getElementById('unitsFlow');
  const c = getLevelCourse(currentLevel);
  if (!c) { el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--theme-secondary)">课程加载中...</div>'; return; }

  let html = '';
  c.units.forEach((u, i) => {
    const isActive = (activeUnitIdx === i);
    const isDone = u.done;
    html += '<div class="unit-card' + (isActive?' active':'') + (isDone?' done':'') + '">';
    html += '<div class="unit-head" onclick="toggleUnit(' + i + ')">';
    html += '<div class="unit-emoji">' + u.icon + '</div>';
    html += '<div class="unit-info">';
    html += '<div class="unit-name">' + u.name + '</div>';
    html += '<div class="unit-desc">' + u.desc + '</div>';
    html += '</div>';
    html += '<div class="unit-done-mark">✓</div>';
    html += '<div class="unit-toggle">▶</div>';
    html += '</div>';
    if (isActive) {
      html += '<div class="unit-body" id="unitBody' + i + '">' + renderUnitBody(u, i) + '</div>';
    }
    html += '</div>';
  });
  el.innerHTML = html;
}

function toggleUnit(idx) {
  if (activeUnitIdx === idx) {
    activeUnitIdx = null;
  } else {
    activeUnitIdx = idx;
    // 重置该单元的测验状态
    if (!quizStates[idx]) quizStates[idx] = { idx: 0, score: 0, answered: false };
  }
  renderUnitsFlow();
}

function renderUnitBody(u, unitIdx) {
  let html = '';

  // 学习内容
  const L = u.learn;
  if (L) {
    // Phonetics
    if (L.phonetics && L.phonetics.length) {
      html += '<div class="blk-label">🔤 发音 · Phonetics</div>';
      html += '<div class="phoneme-row">';
      L.phonetics.forEach(p => {
        const ex = (p.example || p.letter).split(' ')[0].replace(/'/g, "\\'");
        html += '<div class="phoneme-tile" onclick="speak(\'' + ex + '\')">';
        html += '<div class="phoneme-letter">' + p.letter + '</div>';
        html += '<div class="phoneme-ipa">/' + p.ipa + '/</div>';
        if (p.example) html += '<div class="phoneme-ex">' + p.example + '</div>';
        html += '</div>';
      });
      html += '</div>';
    }

    // Dialogue
    if (L.dialogue && L.dialogue.length) {
      html += '<div class="blk-label">💬 对话 · Dialogue</div>';
      html += '<div class="dialog-list">';
      L.dialogue.forEach(d => {
        const avatar = d.avatar || (d.role==='A'?'👦':'👧');
        const esText = d.es || d.text || '';
        const zhText = d.zh || '';
        html += '<div class="dialog-item">';
        html += '<div class="dialog-av">' + avatar + '</div>';
        html += '<div class="dialog-bx">';
        html += '<div class="dialog-es">' + esText + ' ' + speakBtn(esText) + '</div>';
        if (zhText) html += '<div class="dialog-zh">' + zhText + '</div>';
        html += '</div></div>';
      });
      html += '</div>';
    }

    // Grammar
    if (L.grammar && L.grammar.rows && L.grammar.rows.length) {
      html += '<div class="blk-label">📝 语法 · Grammar</div>';
      html += '<table class="grammar-tbl"><thead><tr>';
      L.grammar.rows[0].forEach(h => html += '<th>' + h + '</th>');
      html += '</tr></thead><tbody>';
      for (let i = 1; i < L.grammar.rows.length; i++) {
        html += '<tr>';
        L.grammar.rows[i].forEach(cell => html += '<td>' + cell + '</td>');
        html += '</tr>';
      }
      html += '</tbody></table>';
      if (L.grammar.note) html += '<div class="grammar-note">' + L.grammar.note + '</div>';
    }

    // Standalone note
    if (L.note && !L.grammar) {
      html += '<div class="blk-label">💡 要点 · Note</div>';
      html += '<div class="grammar-note">' + L.note + '</div>';
    }

    // Vocab
    if (L.vocab && L.vocab.length) {
      html += '<div class="blk-label">📖 词汇 · Vocabulary <span style="font-weight:500;opacity:0.7;text-transform:none;letter-spacing:0;font-size:11px">点击卡片看例句</span></div>';
      html += '<div class="vocab-row">';
      L.vocab.forEach(v => {
        html += '<div class="vocab-tile" onclick="this.classList.toggle(\'flipped\')">';
        html += '<div class="vocab-es">' + v.es + ' ' + speakBtn(v.es) + '</div>';
        html += '<div class="vocab-zh">' + v.zh + '</div>';
        if (v.ex) html += '<div class="vocab-ex">' + v.ex + '</div>';
        html += '</div>';
      });
      html += '</div>';
    }
  }

  // 测验
  if (u.quiz && u.quiz.length) {
    html += renderQuizSection(u, unitIdx);
  }

  return html;
}

function renderQuizSection(u, unitIdx) {
  if (!quizStates[unitIdx]) quizStates[unitIdx] = { idx: 0, score: 0, answered: false };
  const st = quizStates[unitIdx];
  const q = u.quiz[st.idx];
  if (!q) return renderQuizResult(u, unitIdx);

  let html = '<div class="blk-label">✏️ 测验 · Quiz</div>';
  html += '<div class="quiz-box">';
  html += '<div class="quiz-top">';
  html += '<span>' + (st.idx + 1) + ' / ' + u.quiz.length + '</span>';
  html += '<span class="score-tag">' + st.score + ' 分</span>';
  html += '</div>';

  if (q.type === 'choice') {
    html += '<div class="quiz-q">' + q.q + '</div>';
    html += '<div class="quiz-opts">';
    const letters = ['A','B','C','D'];
    q.options.forEach((opt, i) => {
      html += '<button class="quiz-opt" id="qopt-' + unitIdx + '-' + i + '" onclick="checkChoice(' + unitIdx + ',' + i + ',' + q.answer + ',\'' + (q.explain||'').replace(/'/g,"\\'") + '\')">';
      html += '<span class="opt-letter">' + letters[i] + '</span> ' + opt;
      html += '</button>';
    });
    html += '</div>';
  } else if (q.type === 'fill') {
    html += '<div class="quiz-q">' + q.q + '</div>';
    html += '<input class="quiz-input" id="qfill-' + unitIdx + '" type="text" placeholder="输入答案..." onkeydown="if(event.key===\'Enter\')checkFill(' + unitIdx + ',\'' + q.answer.replace(/'/g,"\\'") + '\',\'' + (q.explain||'').replace(/'/g,"\\'") + '\')">';
    html += '<button class="btn-primary" onclick="checkFill(' + unitIdx + ',\'' + q.answer.replace(/'/g,"\\'") + '\',\'' + (q.explain||'').replace(/'/g,"\\'") + '\')">提交</button>';
  }

  html += '<div class="quiz-feedback" id="qfb-' + unitIdx + '"></div>';
  html += '<div id="qnext-' + unitIdx + '" style="display:none"><button class="btn-primary" onclick="nextQuestion(' + unitIdx + ')">下一题 →</button></div>';
  html += '</div>';

  return html;
}

function checkChoice(unitIdx, selected, correct, explain) {
  const st = quizStates[unitIdx];
  if (st.answered) return;
  st.answered = true;

  const selEl = document.getElementById('qopt-' + unitIdx + '-' + selected);
  if (selEl) selEl.classList.add(selected === correct ? 'correct' : 'wrong');
  if (selected !== correct) {
    const corEl = document.getElementById('qopt-' + unitIdx + '-' + correct);
    if (corEl) corEl.classList.add('correct');
  }

  const fb = document.getElementById('qfb-' + unitIdx);
  if (selected === correct) {
    st.score += 20;
    fb.className = 'quiz-feedback show correct';
    fb.textContent = '✅ 正确！' + (explain ? ' ' + explain : '');
  } else {
    fb.className = 'quiz-feedback show wrong';
    fb.textContent = '❌ 错误。' + (explain ? ' ' + explain : '');
  }
  document.getElementById('qnext-' + unitIdx).style.display = 'block';
  document.querySelectorAll('.quiz-opt').forEach(b => b.disabled = true);
}

function checkFill(unitIdx, answer, explain) {
  const st = quizStates[unitIdx];
  if (st.answered) return;
  const input = document.getElementById('qfill-' + unitIdx);
  const userAns = input.value.trim().toLowerCase();
  const correctAns = answer.toLowerCase();
  if (!userAns) return;

  st.answered = true;
  const fb = document.getElementById('qfb-' + unitIdx);
  const isCorrect = userAns === correctAns ||
    userAns.replace(/\s+/g,'') === correctAns.replace(/\s+/g,'') ||
    (correctAns.includes(userAns) && userAns.length >= correctAns.length * 0.6);

  input.classList.add(isCorrect ? 'correct' : 'wrong');
  if (isCorrect) {
    st.score += 20;
    fb.className = 'quiz-feedback show correct';
    fb.textContent = '✅ 正确！答案：' + answer + (explain ? ' ' + explain : '');
  } else {
    fb.className = 'quiz-feedback show wrong';
    fb.textContent = '❌ 错误。正确答案：' + answer + (explain ? ' ' + explain : '');
  }
  document.getElementById('qnext-' + unitIdx).style.display = 'block';
  input.disabled = true;
}

function nextQuestion(unitIdx) {
  quizStates[unitIdx].idx++;
  quizStates[unitIdx].answered = false;
  // 仅重渲染当前展开单元的 body
  const c = getLevelCourse(currentLevel);
  const u = c.units[unitIdx];
  const bodyEl = document.getElementById('unitBody' + unitIdx);
  if (bodyEl) bodyEl.innerHTML = renderUnitBody(u, unitIdx);
}

function renderQuizResult(u, unitIdx) {
  const st = quizStates[unitIdx];
  const total = u.quiz.length * 20;
  const pct = Math.round(st.score / total * 100);
  let stars = '😅';
  if (pct >= 90) stars = '⭐⭐⭐';
  else if (pct >= 70) stars = '⭐⭐';
  else if (pct >= 40) stars = '⭐';

  if (pct >= 60) {
    u.done = true;
    saveProgress();
    // 不立刻 re-render 整个 flow（避免折叠），只更新 done 标记
    const cards = document.querySelectorAll('.unit-card');
    if (cards[unitIdx]) cards[unitIdx].classList.add('done');
    updateGlobalProgress();
    renderLevelTabs();
  }

  let msg = '';
  if (pct >= 90) msg = '太棒了！完美掌握！';
  else if (pct >= 70) msg = '不错！继续加油！';
  else if (pct >= 60) msg = '及格了，再复习一下会更好！';
  else msg = '需要多练习，别灰心！';

  let html = '<div class="blk-label">✏️ 测验 · Quiz</div>';
  html += '<div class="quiz-box"><div class="quiz-result-box">';
  html += '<div class="result-num">' + st.score + '</div>';
  html += '<div class="result-msg">' + msg + '</div>';
  html += '<div class="result-stars">' + stars + '</div>';
  html += '<button class="btn-primary" onclick="resetQuiz(' + unitIdx + ')">再测一次</button>';
  html += '</div></div>';
  return html;
}

function resetQuiz(unitIdx) {
  quizStates[unitIdx] = { idx: 0, score: 0, answered: false };
  const c = getLevelCourse(currentLevel);
  const u = c.units[unitIdx];
  const bodyEl = document.getElementById('unitBody' + unitIdx);
  if (bodyEl) bodyEl.innerHTML = renderUnitBody(u, unitIdx);
}

// ── Progress ──
function saveProgress() {
  const data = {};
  getAllLevels().forEach(lv => {
    const c = getLevelCourse(lv);
    if (c) data[lv] = c.units.map(u => u.done ? 1 : 0);
  });
  try { localStorage.setItem('espanol_progress', JSON.stringify(data)); } catch(e) {}
}
function loadProgress() {
  try {
    const raw = localStorage.getItem('espanol_progress');
    if (!raw) return;
    const data = JSON.parse(raw);
    getAllLevels().forEach(lv => {
      const c = getLevelCourse(lv);
      if (c && data[lv]) data[lv].forEach((d, i) => { if (c.units[i]) c.units[i].done = !!d; });
    });
  } catch(e) {}
}
function updateGlobalProgress() {
  const p = getProgress();
  document.getElementById('globalProgress').style.width = p.pct + '%';
  document.getElementById('globalProgressText').textContent = p.pct + '% · ' + p.done + '/' + p.total + ' 单元';
  saveProgress();
}

// ── Init ──
function renderAll() {
  renderLevelTabs();
  renderUnitsFlow();
  updateGlobalProgress();
}

loadProgress();
renderAll();
</script>

</html>

  <script>
/* ===========================
   ESPN API 配置（MLS 东部联盟）
   =========================== */
const ESPN = {
  standings: 'https://sports.core.api.espn.com/v2/sports/soccer/leagues/usa.1/seasons/2026/types/1/groups/1/standings/0',
  schedule: 'https://site.api.espn.com/apis/site/v2/sports/soccer/usa.1/teams/20232/schedule',
  miamiAbbr: 'MIA',
  miamiTeamId: '20232'
};

/* ===========================
   球队中文映射
   =========================== */
const TEAM_ZH = {
  'Inter Miami CF': '迈阿密国际', 'Inter Miami': '迈阿密国际',
  'Nashville SC': '纳什维尔', 'Nashville': '纳什维尔',
  'New York City FC': '纽约城', 'New York City': '纽约城', 'NYCFC': '纽约城',
  'Charlotte FC': '夏洛特FC', 'Charlotte': '夏洛特',
  'Chicago Fire FC': '芝加哥火焰', 'Chicago Fire': '芝加哥火焰', 'CF Montréal': '蒙特利尔',
  'Toronto FC': '多伦多FC', 'Toronto': '多伦多',
  'Red Bull New York': '纽约红牛', 'New York Red Bulls': '纽约红牛', 'Red Bull NY': '纽约红牛',
  'D.C. United': '华盛顿联', 'DC United': '华盛顿联',
  'New England Revolution': '新英格兰革命', 'New England': '新英格兰',
  'FC Cincinnati': '辛辛那提', 'Cincinnati': '辛辛那提',
  'Columbus Crew': '哥伦布机员', 'Columbus': '哥伦布机员',
  'Atlanta United FC': '亚特兰大联', 'Atlanta United': '亚特兰大联', 'Atlanta': '亚特兰大',
  'CF Montréal': '蒙特利尔冲击', 'Montreal Impact': '蒙特利尔冲击',
  'Orlando City SC': '奥兰多城', 'Orlando City': '奥兰多城', 'Orlando': '奥兰多城',
  'Philadelphia Union': '费城联合', 'Philadelphia': '费城联合'
};

/* ===========================
   工具函数
   =========================== */
function $(id) { return document.getElementById(id); }
function fixUrl(u) { return u.replace('http://', 'https://'); }
function zhName(name) { return TEAM_ZH[name] || TEAM_ZH[name.replace(/ FC$/,'')] || TEAM_ZH[name.replace(/ SC$/,'')] || name; }

/* ===========================
   加载积分榜（ESPN API，支持CORS）
   =========================== */
async function loadStandings() {
  try {
    // 第1步：获取积分榜球队列表（1次请求）
    // standings entry 自带 records[0].stats（含完整战绩），无需逐队请求 record
    const stResp = await fetch(ESPN.standings + '?lang=en');
    if (!stResp.ok) throw new Error('HTTP ' + stResp.status);
    const stData = await stResp.json();

    const entries = stData.standings || [];
    if (entries.length === 0) throw new Error('空数据');

    // 第2步：分批获取每支球队的名称和 form（每批5队，每队1次请求）
    const results = [];
    const BATCH = 5;
    for (let i = 0; i < entries.length; i += BATCH) {
      const batch = entries.slice(i, i + BATCH);
      const batchResults = await Promise.all(
        batch.map(async (entry) => {
          const teamRef = entry.team.$ref;
          // 从 records[0].stats 直接提取完整战绩
          const stats = (entry.records && entry.records[0] && entry.records[0].stats) || [];
          const rankStat = stats.find(function(s) { return s.name === 'rank'; });
          try {
            const teamResp = await fetch(fixUrl(teamRef));
            const teamData = await teamResp.json();

            // form 是字符串如 "WWLDW"，需拆成数组
            var formArr = [];
            if (teamData.form && typeof teamData.form === 'string') {
              formArr = teamData.form.split('');
            }

            return {
              rank: rankStat ? (parseInt(rankStat.value) || i + 1) : i + 1,
              name: teamData.displayName || teamData.shortDisplayName || '',
              shortName: teamData.shortDisplayName || '',
              abbr: teamData.abbreviation || '',
              form: formArr,
              stats: stats
            };
          } catch (e) {
            console.warn('球队数据获取失败:', e);
            return null;
          }
        })
      );
      results.push(...batchResults);
    }

    const teams = results.filter(Boolean);
    if (teams.length === 0) throw new Error('所有球队数据获取失败');

    // 第3步：找到迈阿密国际
    const miami = teams.find(function(t) {
      return t.abbr === ESPN.miamiAbbr || t.name.includes('Inter Miami');
    });

    renderStats(miami);
    renderStandings(teams, miami);

    $('standingsDate').textContent = '（截至 ' + new Date().toLocaleDateString('zh-CN') + '）';

  } catch (e) {
    console.error('积分榜加载失败:', e);
    $('standingsLoading').innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px;">加载失败，点击刷新重试</div>';
    $('statsLoading').innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px;">数据加载失败</div>';
  }
}

/* 从 stats 数组中提取指定字段的值 */
function getStat(stats, name) {
  const s = stats.find(function(x) { return x.name === name; });
  return s ? (parseInt(s.value) || 0) : 0;
}
function getStatDisplay(stats, name) {
  const s = stats.find(function(x) { return x.name === name; });
  return s ? (s.displayValue || s.value || '0') : '0';
}

/* 渲染数据总览卡片 */
function renderStats(miami) {
  if (!miami) return;
  const played = getStat(miami.stats, 'gamesPlayed');
  const points = getStat(miami.stats, 'points');
  const wins = getStat(miami.stats, 'wins');
  const losses = getStat(miami.stats, 'losses');
  const ties = getStat(miami.stats, 'ties') || getStat(miami.stats, 'draws');
  const goalsFor = getStat(miami.stats, 'pointsFor');
  const goalsAgainst = getStat(miami.stats, 'pointsAgainst');
  const gd = getStatDisplay(miami.stats, 'pointDifferential');

  $('statsContent').innerHTML =
    '<div class="team-stats">' +
      '<div><div class="team-stat-num">' + points + '</div><div class="team-stat-label">积分</div></div>' +
      '<div><div class="team-stat-num">' + miami.rank + suffix(miami.rank) + '</div><div class="team-stat-label">东部排名</div></div>' +
      '<div><div class="team-stat-num">' + played + '场</div><div class="team-stat-label">已赛</div></div>' +
    '</div>' +
    '<div class="team-stats" style="border-bottom:none;padding-top:0;">' +
      '<div><div class="team-stat-num">' + wins + '-' + ties + '-' + losses + '</div><div class="team-stat-label">胜-平-负</div></div>' +
      '<div><div class="team-stat-num">' + goalsFor + ':' + goalsAgainst + '</div><div class="team-stat-label">进球:失球</div></div>' +
      '<div><div class="team-stat-num">' + gd + '</div><div class="team-stat-label">净胜球</div></div>' +
    '</div>';

  $('statsLoading').style.display = 'none';
  $('statsContent').style.display = '';
}

function suffix(n) { return n===1?'st':n===2?'nd':n===3?'rd':'th'; }

/* 渲染积分榜表格 */
function renderStandings(teams, miami) {
  // 按 rank 排序（修复异步请求导致顺序错乱的问题）
  teams.sort(function(a, b) { return a.rank - b.rank; });

  let html = '';
  teams.forEach(function(t) {
    var hl = miami && t.abbr === miami.abbr;
    var played = getStat(t.stats, 'gamesPlayed');
    var wins = getStat(t.stats, 'wins');
    var draws = getStat(t.stats, 'ties') || getStat(t.stats, 'draws');
    var losses = getStat(t.stats, 'losses');
    var goalsFor = getStat(t.stats, 'pointsFor');
    var goalsAgainst = getStat(t.stats, 'pointsAgainst');
    var gd = getStatDisplay(t.stats, 'pointDifferential');
    var points = getStat(t.stats, 'points');

    var prefix = hl ? '🩷 ' : '';

    // 近期状态
    var formDots = '';
    if (t.form && t.form.length > 0) {
      for (var i = 0; i < Math.min(t.form.length, 5); i++) {
        var f = t.form[i];
        var color = f==='W' ? '#16a34a' : f==='D' ? '#f59e0b' : f==='L' ? '#ef4444' : '#999';
        formDots += '<span class="form-dot" style="background:' + color + ';"></span>';
      }
    }

    // 季后赛资格线（第9名之前画线）
    var cls = '';
    if (t.rank === 9) cls = 'playoff-line';

    html += '<tr class="' + (hl ? 'highlight' : '') + ' ' + cls + '">' +
      '<td class="rank">' + t.rank + '</td>' +
      '<td>' + prefix + zhName(t.name) + '<span class="form-dots">' + formDots + '</span></td>' +
      '<td>' + played + '</td>' +
      '<td>' + wins + '</td>' +
      '<td>' + draws + '</td>' +
      '<td>' + losses + '</td>' +
      '<td>' + goalsFor + ':' + goalsAgainst + '</td>' +
      '<td>' + gd + '</td>' +
      '<td class="pts">' + points + '</td>' +
    '</tr>';
  });
  $('standingsBody').innerHTML = html;
  $('standingsLoading').style.display = 'none';
  $('standingsContent').style.display = '';
}

/* 页面加载后自动获取数据 */
document.addEventListener('DOMContentLoaded', function() {
  loadStandings();
  loadRecentMatches();
  loadTeamNews();
  loadTeamRoster();
  setupAutoRefresh();
});

/* ===========================
   新闻流：ESPN MLS 新闻 + 迈阿密关键词过滤
   =========================== */
function loadTeamNews() {
  if (!window.TeamDynamic) return;
  TeamDynamic.loadTeamNews({
    league: 'usa.1',
    keywords: ['miami', 'messi', 'suarez', 'busquets', 'alba', 'inter miami', 'mascherano'],
    limit: 5,
    containerId: 'newsContent',
    loadingId: 'newsLoading'
  });
}

/* ===========================
   球员本赛季数据：ESPN Roster API
   =========================== */
function loadTeamRoster() {
  if (!window.TeamDynamic) return;
  TeamDynamic.loadTeamRoster({
    league: 'usa.1',
    teamId: ESPN.miamiTeamId,
    season: '2026',
    containerId: 'rosterContent',
    loadingId: 'rosterLoading'
  });
}

/* ===========================
   自动刷新：每 5 分钟重新拉取所有动态数据
   =========================== */
function setupAutoRefresh() {
  if (!window.TeamDynamic) return;
  window.__autoRefreshCallbacks = [loadStandings, loadRecentMatches, loadTeamNews, loadTeamRoster];
  TeamDynamic.setupAutoRefresh(300, window.__autoRefreshCallbacks, 'refreshCountdown');
}

/* ===========================
   加载最近5场比赛（ESPN Schedule API）
   =========================== */
function loadRecentMatches() {
  // 方案1：site.api.espn.com（单请求，但可能被网络拦截）
  fetch(ESPN.schedule + '?lang=en')
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) {
      renderRecentMatches(data.events || []);
    })
    .catch(function(e) {
      console.warn('site API 失败，尝试 core API:', e.message);
      loadRecentMatchesFallback();
    });
}

/* Fallback：通过 sports.core.api.espn.com 获取赛程 */
function loadRecentMatchesFallback() {
  var teamEventsUrl = 'https://sports.core.api.espn.com/v2/sports/soccer/leagues/usa.1/seasons/2026/teams/20232/events';
  fetch(teamEventsUrl + '?lang=en')
    .then(function(r) { return r.json(); })
    .then(function(list) {
      return collectFinishedMatches(teamEventsUrl, list.pageCount || 1);
    })
    .then(function(matches) {
      renderRecentMatchesCore(matches);
    })
    .catch(function(e) {
      console.error('最近比赛(core)加载失败:', e);
      $('recentLoading').innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px;">加载失败: ' + (e.message || '未知错误') + '</div>';
    });
}

/* 逐页获取已完赛比赛，凑够5场就停 */
function collectFinishedMatches(baseUrl, totalPages) {
  var finished = [];
  var currentPage = 1;

  function fetchPage() {
    if (currentPage > totalPages || finished.length >= 5) {
      return Promise.resolve(finished);
    }
    var pageUrl = baseUrl + '?lang=en&page=' + currentPage;
    return fetch(pageUrl)
      .then(function(r) { return r.json(); })
      .then(function(list) {
        var items = list.items || [];
        return Promise.all(items.map(function(ref) {
          var url = ref.$ref;
          if (url.indexOf('http://') === 0) url = 'https://' + url.substring(7);
          return fetch(url).then(function(r) { return r.json(); });
        })).then(function(events) {
          return Promise.all(events.map(function(ev) {
            var comp = ev.competitions && ev.competitions[0];
            if (!comp) return Promise.resolve(null);
            var competitors = comp.competitors || [];
            // status 在 competitions[0].status，不在 event.status
            var statusRef = comp.status && comp.status.$ref;
            var promises = [];
            if (statusRef) {
              var sUrl = statusRef;
              if (sUrl.indexOf('http://') === 0) sUrl = 'https://' + sUrl.substring(7);
              promises.push(fetch(sUrl).then(function(r) { return r.json(); }));
            } else if (comp.status && comp.status.type) {
              promises.push(Promise.resolve(comp.status));
            } else {
              promises.push(Promise.resolve({}));
            }
            var compData = [];
            competitors.forEach(function(c) {
              var tUrl = c.team && c.team.$ref;
              var sUrl2 = c.score && c.score.$ref;
              if (tUrl) { if (tUrl.indexOf('http://') === 0) tUrl = 'https://' + tUrl.substring(7); }
              if (sUrl2) { if (sUrl2.indexOf('http://') === 0) sUrl2 = 'https://' + sUrl2.substring(7); }
              var tPromise = tUrl ? fetch(tUrl).then(function(r) { return r.json(); }) : Promise.resolve({displayName: 'Unknown'});
              var sPromise = sUrl2 ? fetch(sUrl2).then(function(r) { return r.json(); }) : Promise.resolve({value: '0'});
              promises.push(tPromise, sPromise);
              compData.push({ homeAway: c.homeAway });
            });
            return Promise.all(promises).then(function(results) {
              var statusData = results[0];
              var completed = statusData && statusData.type && statusData.type.completed;
              var matchComps = [];
              for (var i = 0; i < compData.length; i++) {
                matchComps.push({
                  homeAway: compData[i].homeAway,
                  team: results[1 + i * 2],
                  score: results[2 + i * 2]
                });
              }
              return { date: ev.date, completed: completed, competitors: matchComps };
            });
          })).then(function(matches) {
            matches.forEach(function(m) {
              if (m && m.completed) finished.push(m);
            });
            currentPage++;
            return fetchPage();
          });
        });
      });
  }

  return fetchPage();
}

/* 渲染最近比赛（统一渲染函数） */
function renderRecentMatches(events) {
  var finished = events.filter(function(e) {
    // status 可能在 ev.status 或 ev.competitions[0].status
    var st = e.status || (e.competitions && e.competitions[0] && e.competitions[0].status);
    return st && st.type && st.type.completed;
  }).sort(function(a, b) {
    return new Date(b.date) - new Date(a.date);
  }).slice(0, 5);

  if (finished.length === 0) {
    $('recentLoading').innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px;">暂无已完赛场次</div>';
    return;
  }

  var miamiName = 'Inter Miami';
  var html = '';

  finished.forEach(function(ev) {
    var comp = ev.competitions && ev.competitions[0];
    if (!comp) return;

    var homeTeam = comp.competitors && comp.competitors.find(function(c) { return c.homeAway === 'home'; });
    var awayTeam = comp.competitors && comp.competitors.find(function(c) { return c.homeAway === 'away'; });
    if (!homeTeam || !awayTeam) return;

    var isMiamiHome = homeTeam.team.displayName.indexOf(miamiName) >= 0;
    var oppTeam = isMiamiHome ? awayTeam : homeTeam;
    var venue = isMiamiHome ? '主' : '客';
    var miamiComp = isMiamiHome ? homeTeam : awayTeam;

    // score 可能是数字字符串或对象 { value, displayValue }
    var miamiScoreVal = miamiComp.score;
    var oppScoreVal = oppTeam.score;
    if (typeof miamiScoreVal === 'object') miamiScoreVal = miamiScoreVal.value;
    if (typeof oppScoreVal === 'object') oppScoreVal = oppScoreVal.value;
    var miamiScore = parseInt(miamiScoreVal) || 0;
    var oppScore = parseInt(oppScoreVal) || 0;

    var resultText, resultClass;
    if (miamiScore > oppScore) { resultText = '胜'; resultClass = 'rm-win'; }
    else if (miamiScore === oppScore) { resultText = '平'; resultClass = 'rm-draw'; }
    else { resultText = '负'; resultClass = 'rm-loss'; }

    var d = new Date(ev.date);
    var mm = String(d.getMonth() + 1).padStart(2, '0');
    var dd = String(d.getDate()).padStart(2, '0');

    var oppZh = zhName(oppTeam.team.displayName);

    html += '<div class="recent-match">' +
      '<span class="rm-date">' + mm + '/' + dd + '</span>' +
      '<span class="rm-venue">' + venue + '</span>' +
      '<span class="rm-vs">' +
        (isMiamiHome ? '<span>迈阿密</span>' : '<span class="rm-opp">' + oppZh + '</span>') +
      '</span>' +
      '<span class="rm-score">' +
        (isMiamiHome ? miamiScore + ' - ' + oppScore : oppScore + ' - ' + miamiScore) +
      '</span>' +
      '<span class="rm-vs">' +
        (isMiamiHome ? '<span class="rm-opp">' + oppZh + '</span>' : '<span>迈阿密</span>') +
      '</span>' +
      '<span class="rm-result ' + resultClass + '">' + resultText + '</span>' +
    '</div>';
  });

  $('recentContent').innerHTML = html;
  $('recentLoading').style.display = 'none';
  $('recentContent').style.display = '';
  $('recentDate').textContent = '（截至 ' + new Date().toLocaleDateString('zh-CN') + '）';
}

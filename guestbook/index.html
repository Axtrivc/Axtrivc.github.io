<script>
const STORAGE_KEY = 'axtrivc_messages';
let selectedMood = '😊';

// Mood picker
document.querySelectorAll('.mood-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedMood = btn.dataset.mood;
  });
});
document.querySelector('.mood-btn').classList.add('selected');

function getMessages() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; }
}

function saveMessages(msgs) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(msgs));
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return '刚刚';
  if (mins < 60) return mins + ' 分钟前';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + ' 小时前';
  const days = Math.floor(hrs / 24);
  if (days < 30) return days + ' 天前';
  return new Date(ts).toLocaleDateString('zh-CN');
}

function renderMessages() {
  const msgs = getMessages();
  const list = document.getElementById('msgList');
  document.getElementById('msgCount').textContent = msgs.length + ' 条留言';

  if (!msgs.length) {
    list.innerHTML = '<div class="msg-empty"><span>📭</span>还没有留言，来当第一个吧！</div>';
    return;
  }

  list.innerHTML = msgs.map((m, i) => `
    <div class="msg-card">
      <div class="msg-header">
        <div class="msg-avatar">${escapeHtml(m.name.charAt(0).toUpperCase())}</div>
        <div class="msg-meta">
          <div class="msg-name">${escapeHtml(m.name)}</div>
          <div class="msg-time">${timeAgo(m.time)}</div>
        </div>
        <div class="msg-mood">${m.mood}</div>
      </div>
      <div class="msg-content">${escapeHtml(m.content).replace(/\n/g, '<br>')}</div>
      ${m.replies && m.replies.length ? `<div class="msg-reply">${m.replies.map(r => `<div class="msg-reply-item"><span class="reply-name">${escapeHtml(r.name)}</span>：${escapeHtml(r.content)}</div>`).join('')}</div>` : ''}
      <div class="msg-actions"><button class="btn-reply-toggle" onclick="toggleReply(${i})">💬 回复</button></div>
      <div class="msg-reply" id="reply-form-${i}" style="display:none">
        <div class="msg-reply-form">
          <input type="text" id="reply-name-${i}" placeholder="你的昵称" maxlength="20" />
          <input type="text" id="reply-content-${i}" placeholder="回复内容..." maxlength="200" />
          <button onclick="addReply(${i})">回复</button>
        </div>
      </div>
    </div>
  `).join('');
}

function toggleReply(idx) {
  const form = document.getElementById('reply-form-' + idx);
  form.style.display = form.style.display === 'none' ? 'block' : 'none';
}

function addReply(idx) {
  const name = document.getElementById('reply-name-' + idx).value.trim();
  const content = document.getElementById('reply-content-' + idx).value.trim();
  if (!name || !content) return alert('昵称和内容都不能为空哦');
  const msgs = getMessages();
  if (!msgs[idx].replies) msgs[idx].replies = [];
  msgs[idx].replies.push({ name, content, time: Date.now() });
  saveMessages(msgs);
  renderMessages();
}

function submitMsg() {
  const name = document.getElementById('msgName').value.trim() || '匿名';
  const content = document.getElementById('msgContent').value.trim();
  if (!content) return alert('写点什么再提交吧～');
  const msgs = getMessages();
  msgs.unshift({ name, content, mood: selectedMood, time: Date.now(), replies: [] });
  saveMessages(msgs);
  document.getElementById('msgContent').value = '';
  renderMessages();
}

renderMessages();
</script>

<script>
(function() {
  let panelOpen = false;
  let isPlaying = false;
  const panel = document.getElementById('music-panel');
  const bar = document.getElementById('music-bar');
  const btnToggle = document.getElementById('btn-toggle');
  const iconUp = document.getElementById('icon-up');
  const vinyl = document.getElementById('vinyl-icon');
  const barSub = document.querySelector('.bar-sub');

  window.togglePlayer = function() {
    panelOpen = !panelOpen;
    if (panelOpen) {
      panel.classList.add('show');
      iconUp.innerHTML = '<path d="M6 9l6 6 6-6"/>';
      barSub.textContent = '点击播放 ♪';
    } else {
      panel.classList.remove('show');
      iconUp.innerHTML = '<path d="M18 15l-6-6-6 6"/>';
    }
  };

  // Listen for Spotify embed messages (play/pause state)
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'SPOTIFY_FRAME_MESSAGE') {
      try {
        const payload = typeof e.data.payload === 'string' ? JSON.parse(e.data.payload) : e.data.payload;
        if (payload && payload.data && payload.data.is_playing !== undefined) {
          isPlaying = payload.data.is_playing;
          if (isPlaying) {
            vinyl.classList.add('playing');
            vinyl.textContent = '🎶';
            barSub.textContent = '正在播放...';
          } else {
            vinyl.classList.remove('playing');
            vinyl.textContent = '🎵';
            barSub.textContent = '已暂停';
          }
        }
      } catch(err) {}
    }
  });

  // Close panel when clicking outside
  document.addEventListener('click', function(e) {
    if (panelOpen && !panel.contains(e.target) && !btnToggle.contains(e.target)) {
      panelOpen = false;
      panel.classList.remove('show');
      iconUp.innerHTML = '<path d="M18 15l-6-6-6 6"/>';
    }
  });
})();
</script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  if (window.location.pathname !== '/' && window.location.pathname !== '/index.html') return;
  var bdayMonth = 5, bdayDay = 12;
  var now = new Date();
  var isToday = (now.getMonth() === bdayMonth - 1 && now.getDate() === bdayDay);

  var card = document.createElement('div');
  card.className = 'bday-countdown' + (isToday ? ' today' : '');

  if (isToday) {
    card.innerHTML = '<div class="bday-emoji">🎂🎉</div><div class="bday-name">今天是 Axtrivc 的生日！</div><div class="bday-date">5月12日 · Happy Birthday!</div>';
  } else {
    card.innerHTML = '<div class="bday-emoji">🎂</div><div class="bday-label">BIRTHDAY COUNTDOWN</div><div class="bday-name">Axtrivc 的生日</div><div class="bday-grid"><div class="bday-num"><span class="num" id="bday-d">00</span><span class="unit">天</span></div><div class="bday-num"><span class="num" id="bday-h">00</span><span class="unit">时</span></div><div class="bday-num"><span class="num" id="bday-m">00</span><span class="unit">分</span></div><div class="bday-num"><span class="num" id="bday-s">00</span><span class="unit">秒</span></div></div><div class="bday-date">5月12日</div>';
  }

  var posts = document.getElementById('recent-posts');
  var postItems = document.querySelector('.recent-post-items');
  if (posts && postItems) {
    posts.insertBefore(card, postItems);
  } else if (posts) {
    posts.insertBefore(card, posts.firstChild);
  }

  if (!isToday) {
    function pad(n) { return n < 10 ? '0' + n : '' + n; }
    function tick() {
      var n = new Date();
      var nx = new Date(n.getFullYear(), bdayMonth - 1, bdayDay);
      if (nx <= n) nx = new Date(n.getFullYear() + 1, bdayMonth - 1, bdayDay);
      var d = nx - n;
      var dd = Math.floor(d / 86400000);
      var hh = Math.floor((d % 86400000) / 3600000);
      var mm = Math.floor((d % 3600000) / 60000);
      var ss = Math.floor((d % 60000) / 1000);
      var ed = document.getElementById('bday-d');
      var eh = document.getElementById('bday-h');
      var em = document.getElementById('bday-m');
      var es = document.getElementById('bday-s');
      if (ed) ed.textContent = pad(dd);
      if (eh) eh.textContent = pad(hh);
      if (em) em.textContent = pad(mm);
      if (es) es.textContent = pad(ss);
    }
    tick();
    setInterval(tick, 1000);
  }
});
</script>

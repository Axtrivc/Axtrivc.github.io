layout: false

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>River Hero · 预览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0e1a;
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    /* Hero canvas */
    #heroCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 1;
    }
    /* Fallback when WebGL unavailable */
    .hero-fallback {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, #0a0e1a 0%, #1a2a3e 50%, #0d1828 100%);
      z-index: 0;
    }
    /* HUD: debug overlay */
    .hud {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.6);
      color: #bcdcD0;
      font-family: "SF Mono", "Consolas", monospace;
      font-size: 11px;
      padding: 8px 12px;
      border-radius: 6px;
      pointer-events: none;
      line-height: 1.6;
      backdrop-filter: blur(6px);
    }
    .hud .label { color: #6d8a9f; }
    .hud .value { color: #bcdcD0; }
    .hud .err { color: #ff6b6b; }
    .hud .ok { color: #4ade80; }

    /* Loading */
    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #6d8a9f;
      font-size: 13px;
      z-index: 5;
      letter-spacing: 0.05em;
    }
    .loading.hidden { display: none; }
  </style>
</head>
<body>
  <div class="hero-fallback"></div>
  <canvas id="heroCanvas"></canvas>
  <div class="loading" id="loading">启动中…</div>
  <div class="hud" id="hud" style="display:none;">
    <div><span class="label">状态:</span> <span class="value" id="hudStatus">—</span></div>
    <div><span class="label">WebGL:</span> <span class="value" id="hudGL">—</span></div>
    <div><span class="label">FPS:</span> <span class="value" id="hudFPS">—</span></div>
    <div><span class="label">分辨率:</span> <span class="value" id="hudRes">—</span></div>
    <div><span class="label">阶段:</span> <span class="value" id="hudStage">flow-field-v1</span></div>
  </div>

  <script src="hero.js?v=8"></script>
</body>
</html>

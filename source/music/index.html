<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>歌单分享 · My Playlist</title>
  <link rel="stylesheet" href="/football/assets/common.css" />
  <style>
    .music-page { max-width: 860px; margin: 0 auto; padding: 20px; }
    .music-hero { text-align: center; padding: 40px 0 30px; }
    .music-hero h2 { font-size: 28px; font-weight: 700; margin-bottom: 8px; color: #4a3728; }
    .music-hero p { color: #8B6F47; font-size: 14px; }

    /* Tabs */
    .playlist-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .playlist-tab { padding: 10px 22px; border-radius: 20px; border: 1.5px solid #e0d5c5; background: transparent; color: #8B6F47; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; }
    .playlist-tab:hover { background: #f5f0e8; }
    .playlist-tab.active { background: #8B6F47; color: #fff; border-color: #8B6F47; }

    /* Tab Content */
    .playlist-panel { display: none; }
    .playlist-panel.active { display: block; }
    .panel-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .panel-icon { width: 48px; height: 48px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .panel-icon.piano { background: #f0e8d8; }
    .panel-icon.hits { background: #fce4e4; }
    .panel-icon.workout { background: #e4f0e4; }
    .panel-icon.random { background: #e4e8f0; }
    .panel-title { font-size: 18px; font-weight: 700; color: #4a3728; }
    .panel-desc { font-size: 12px; color: #a09080; margin-top: 2px; }

    /* Spotify Embed */
    .spotify-embed { border-radius: 12px; overflow: hidden; background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 16px; }
  </style>
</head>
<body>

  <div class="top-nav">
    <a href="/">首页</a>
    <span class="nav-sep">|</span>
    <span class="nav-current">🎵 歌单分享</span>
  </div>

  <div class="music-page">

    <div class="music-hero">
      <h2>🎵 My Playlist</h2>
      <p>用音乐记录心情 · 点击播放，享受每一刻</p>
    </div>

    <!-- Category Tabs -->
    <div class="playlist-tabs">
      <button class="playlist-tab active" onclick="switchTab('piano', this)">🎹 纯音乐</button>
      <button class="playlist-tab" onclick="switchTab('hits', this)">🔥 热搜榜</button>
      <button class="playlist-tab" onclick="switchTab('workout', this)">🏃 运动</button>
      <button class="playlist-tab" onclick="switchTab('random', this)">🎲 随机</button>
    </div>

    <!-- 纯音乐 -->
    <div class="playlist-panel active" id="panel-piano">
      <div class="panel-header">
        <div class="panel-icon piano">🎹</div>
        <div>
          <div class="panel-title">Peaceful Piano</div>
          <div class="panel-desc">安静钢琴曲，适合学习、阅读和发呆</div>
        </div>
      </div>
      <div class="spotify-embed">
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DX4sWSpwq3LiO?utm_source=generator&theme=0" width="100%" height="480" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
      </div>
      <div class="spotify-embed">
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DWZd79rJ6a7lp?utm_source=generator&theme=0" width="100%" height="380" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
      </div>
    </div>

    <!-- 热搜榜 -->
    <div class="playlist-panel" id="panel-hits">
      <div class="panel-header">
        <div class="panel-icon hits">🔥</div>
        <div>
          <div class="panel-title">Today's Top Hits</div>
          <div class="panel-desc">全球最火的歌曲都在这里</div>
        </div>
      </div>
      <div class="spotify-embed">
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM5M?utm_source=generator&theme=0" width="100%" height="480" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
      </div>
      <div class="spotify-embed">
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DX9XIFQuFvzM4?utm_source=generator&theme=0" width="100%" height="380" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
      </div>
    </div>

    <!-- 运动 -->
    <div class="playlist-panel" id="panel-workout">
      <div class="panel-header">
        <div class="panel-icon workout">🏃</div>
        <div>
          <div class="panel-title">Workout Beats</div>
          <div class="panel-desc">燃烧卡路里的最佳伴奏</div>
        </div>
      </div>
      <div class="spotify-embed">
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DXBx6DKB6jL6R?utm_source=generator&theme=0" width="100%" height="480" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
      </div>
      <div class="spotify-embed">
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DX0XUsuxKHRJZ?utm_source=generator&theme=0" width="100%" height="380" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
      </div>
    </div>

    <!-- 随机 -->
    <div class="playlist-panel" id="panel-random">
      <div class="panel-header">
        <div class="panel-icon random">🎲</div>
        <div>
          <div class="panel-title">Mint</div>
          <div class="panel-desc">随机推荐，每次都有惊喜</div>
        </div>
      </div>
      <div class="spotify-embed">
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DX4dyzvuaRJ0n?utm_source=generator&theme=0" width="100%" height="480" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
      </div>
      <div class="spotify-embed">
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DX1H8t5R8EiV?utm_source=generator&theme=0" width="100%" height="380" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
      </div>
    </div>

    <!-- Tip -->
    <div style="text-align:center;color:#a09080;font-size:12px;padding:20px 0;">
      💡 登录 Spotify 可播放完整歌曲
    </div>

  </div>

  <div class="footer">
    数据来源：Spotify
  </div>

  <script>
    function switchTab(id, btn) {
      document.querySelectorAll('.playlist-tab').forEach(function(t) { t.classList.remove('active'); });
      document.querySelectorAll('.playlist-panel').forEach(function(p) { p.classList.remove('active'); });
      btn.classList.add('active');
      document.getElementById('panel-' + id).classList.add('active');
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>歌单分享 · Axtrivc's Blog</title>
  <script src="/js/standalone-theme.js"></script>
  <style>
    /* ============================================================
       歌单分享 v2 - 粗体大卡片网格
       字重对齐首页：body 600 / hero 800 / 卡片标题 700-800
       ============================================================ */
    :root {
      --r-sm: 10px;
      --r-md: 14px;
      --r-lg: 18px;
      --max-w: 860px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--theme-body);
      color: var(--theme-text);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Segoe UI", sans-serif;
      font-size: 15px;
      font-weight: 500;
      min-height: 100vh;
      transition: background 0.45s ease, color 0.45s ease;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── 顶部导航 ─── */
    .top-nav {
      background: var(--theme-card);
      border-bottom: 1px solid var(--theme-border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(8px);
      transition: background 0.45s ease, border-color 0.45s ease;
    }
    .top-nav a {
      color: var(--theme-secondary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }
    .top-nav a:hover { color: var(--theme-accent); }
    .top-nav .nav-sep { color: var(--theme-border); }
    .top-nav .nav-current {
      color: var(--theme-heading);
      font-size: 15px;
      font-weight: 700;
    }

    /* ─── 容器 ─── */
    .music-page {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ─── Hero ─── */
    .music-hero {
      padding: 56px 0 32px;
      border-bottom: 1px solid var(--theme-border);
      margin-bottom: 8px;
    }
    .music-hero .hero-emoji {
      font-size: 32px;
      line-height: 1;
      margin-bottom: 16px;
      display: block;
    }
    .music-hero h2 {
      font-size: 38px;
      font-weight: 800;
      letter-spacing: -0.025em;
      color: var(--theme-heading);
      margin-bottom: 8px;
      line-height: 1.15;
    }
    .music-hero p {
      color: var(--theme-secondary);
      font-size: 15px;
      font-weight: 500;
    }

    /* ─── 区块标签 ─── */
    .section-label {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--theme-secondary);
      padding: 28px 0 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-label::before {
      content: '';
      width: 4px;
      height: 14px;
      background: var(--theme-accent);
      border-radius: 2px;
      display: inline-block;
    }

    /* ─── 卡片网格（精选 2 列） ─── */
    .featured-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 600px) { .featured-grid { grid-template-columns: 1fr; } }

    .featured-card {
      background: var(--theme-card);
      border: 1.5px solid var(--theme-border);
      border-radius: var(--r-lg);
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    .featured-card:hover {
      transform: translateY(-2px);
      border-color: var(--theme-accent);
      box-shadow: 0 6px 20px color-mix(in srgb, var(--theme-accent) 14%, transparent);
    }
    .featured-card-header {
      padding: 16px 18px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .fc-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--r-sm);
      background: color-mix(in srgb, var(--theme-accent) 12%, var(--theme-body));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .fc-meta { flex: 1; min-width: 0; }
    .fc-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--theme-heading);
      letter-spacing: -0.01em;
      line-height: 1.3;
    }
    .fc-desc {
      font-size: 12px;
      font-weight: 500;
      color: var(--theme-secondary);
      margin-top: 2px;
    }
    .featured-card-body {
      padding: 14px 18px 18px;
    }
    .featured-card-body iframe {
      display: block;
      width: 100%;
    }

    /* ─── 分类卡网格（粗体大卡 3 列） ─── */
    .category-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      padding-bottom: 8px;
    }
    @media (max-width: 700px) { .category-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 480px) { .category-grid { grid-template-columns: 1fr; } }

    .cat-card {
      background: var(--theme-card);
      border: 1.5px solid var(--theme-border);
      border-radius: var(--r-md);
      padding: 22px 18px 20px;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      text-align: left;
      font-family: inherit;
      width: 100%;
      position: relative;
    }
    .cat-card:hover {
      transform: translateY(-3px);
      border-color: var(--theme-accent);
      box-shadow: 0 8px 24px color-mix(in srgb, var(--theme-accent) 14%, transparent);
    }
    .cat-card.active {
      border-color: var(--theme-accent);
      background: color-mix(in srgb, var(--theme-accent) 6%, var(--theme-card));
    }
    .cat-emoji {
      font-size: 32px;
      line-height: 1;
      margin-bottom: 14px;
      display: block;
    }
    .cat-name {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.01em;
      color: var(--theme-heading);
      margin-bottom: 4px;
    }
    .cat-count {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--theme-secondary);
      margin-bottom: 8px;
    }
    .cat-tag {
      font-size: 12px;
      font-weight: 500;
      color: var(--theme-secondary);
      line-height: 1.5;
    }
    .cat-arrow {
      position: absolute;
      top: 20px;
      right: 18px;
      color: var(--theme-secondary);
      font-size: 14px;
      font-weight: 700;
      transition: transform 0.2s, color 0.2s;
    }
    .cat-card.active .cat-arrow {
      color: var(--theme-accent);
      transform: rotate(90deg);
    }

    /* ─── 展开面板 ─── */
    .cat-panel {
      grid-column: 1 / -1;
      background: var(--theme-card);
      border: 1.5px solid var(--theme-accent);
      border-radius: var(--r-lg);
      padding: 18px 20px 20px;
      display: none;
      animation: panelIn 0.25s ease;
    }
    .cat-panel.show { display: block; }
    @keyframes panelIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .cat-panel-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--theme-secondary);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .panel-embed {
      border-radius: var(--r-md);
      overflow: hidden;
      margin-bottom: 14px;
    }
    .panel-embed:last-child { margin-bottom: 0; }
    .panel-embed iframe {
      display: block;
      width: 100%;
    }

    /* ─── Tip ─── */
    .music-tip {
      text-align: center;
      color: var(--theme-secondary);
      font-size: 13px;
      font-weight: 500;
      padding: 28px 0 8px;
      opacity: 0.8;
    }

    /* ─── Footer ─── */
    .footer {
      text-align: center;
      font-size: 12px;
      font-weight: 500;
      color: var(--theme-secondary);
      padding: 24px 0 32px;
      opacity: 0.6;
      border-top: 1px solid var(--theme-border);
      margin-top: 24px;
    }

    /* ─── 响应式 ─── */
    @media (max-width: 640px) {
      .music-page { padding: 0 16px; }
      .music-hero { padding: 40px 0 24px; }
      .music-hero h2 { font-size: 30px; }
    }
  </style>
</head>
<body>

    <span class="nav-sep">|</span>
    <span class="nav-current">🎵 歌单分享</span>
  </div>

    </div>

    <!-- 精选歌单（2 列大卡） -->
    <div class="section-label">⭐ 精选推荐</div>
    <div class="featured-grid">
      <div class="featured-card">
        <div class="featured-card-header">
          <div class="fc-icon">🎧</div>
          <div class="fc-meta">
            <div class="fc-title">我的私人歌单</div>

        </div>

        </div>
      </div>
      <div class="featured-card">
        <div class="featured-card-header">
          <div class="fc-icon">🎶</div>
          <div class="fc-meta">
            <div class="fc-title">单曲循环</div>
            <div class="fc-desc">无限播放</div>
          </div>
        </div>
        <div class="featured-card-body">
          <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/70kdlALLmDuFcagVQznClA?utm_source=generator&theme=0" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>

    </div>

    <!-- 分类卡网格（3 列） -->
    <div class="section-label">🎼 分类歌单</div>
    <div class="category-grid" id="categoryGrid">

        <span class="cat-emoji">🎹</span>

      </button>

      <button class="cat-card" onclick="toggleCat('hits', this)">
        <span class="cat-emoji">🔥</span>
        <div class="cat-name">热搜榜</div>

        <div class="cat-tag">全球最火歌曲合集</div>
        <span class="cat-arrow">▶</span>
      </button>

      <button class="cat-card" onclick="toggleCat('workout', this)">
        <span class="cat-emoji">🏃</span>
        <div class="cat-name">运动</div>
        <div class="cat-count">2 Playlists</div>
        <div class="cat-tag">燃烧卡路里最佳伴奏</div>

      </button>

      <button class="cat-card" onclick="toggleCat('random', this)">
        <span class="cat-emoji">🎲</span>
        <div class="cat-name">随机推荐</div>
        <div class="cat-count">2 Playlists</div>
        <div class="cat-tag">每次都有惊喜</div>
        <span class="cat-arrow">▶</span>
      </button>

      <!-- 展开面板（动态注入到此处） -->
      <div class="cat-panel" id="panel-piano">
        <div class="cat-panel-title">🎹 纯音乐 · Peaceful Piano</div>
        <div class="panel-embed">
          <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DX4sWSpwq3LiO?utm_source=generator&theme=0" width="100%" height="380" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>
        <div class="panel-embed">
          <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DWZd79rJ6a7lp?utm_source=generator&theme=0" width="100%" height="380" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>
      </div>

      <div class="cat-panel" id="panel-hits">
        <div class="cat-panel-title">🔥 热搜榜 · Today's Top Hits</div>
        <div class="panel-embed">
          <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM5M?utm_source=generator&theme=0" width="100%" height="380" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>
        <div class="panel-embed">
          <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DX9XIFQuFvzM4?utm_source=generator&theme=0" width="100%" height="380" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>

      <div class="cat-panel" id="panel-workout">
        <div class="cat-panel-title">🏃 运动 · Workout Beats</div>
        <div class="panel-embed">
          <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DXBx6DKB6jL6R?utm_source=generator&theme=0" width="100%" height="380" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>
        <div class="panel-embed">
          <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DX0XUsuxKHRJZ?utm_source=generator&theme=0" width="100%" height="380" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>
      </div>

      <div class="cat-panel" id="panel-random">
        <div class="cat-panel-title">🎲 随机推荐 · Mint</div>
        <div class="panel-embed">
          <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DX4dyzvuaRJ0n?utm_source=generator&theme=0" width="100%" height="380" frameBoarder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>
        <div class="panel-embed">
          <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DX1H8t5R8EiV?utm_source=generator&theme=0" width="100%" height="380" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>

    </div>

    <div class="music-tip">💡 登录 Spotify 可播放完整歌曲</div>

  </div>

  <div class="footer">数据来源：Spotify · © Axtrivc</div>

  <script>
    // 分类卡展开/收起逻辑
    let activeCat = null;

    function toggleCat(id, btn) {
      const grid = document.getElementById('categoryGrid');
      const allPanels = document.querySelectorAll('.cat-panel');
      const allCards = document.querySelectorAll('.cat-card');

      // 如果点击的就是当前打开的，则收起
      if (activeCat === id) {
        allPanels.forEach(p => {
          p.classList.remove('show');
          // 把面板移回原位（grid 末尾）
          grid.appendChild(p);
        });
        allCards.forEach(c => c.classList.remove('active'));
        activeCat = null;
        return;
      }

      // 关闭所有
      allPanels.forEach(p => p.classList.remove('show'));
      allCards.forEach(c => c.classList.remove('active'));

      // 打开目标
      const panel = document.getElementById('panel-' + id);
      btn.classList.add('active');

      // 把面板插到当前点击的卡片后面（grid 顺序：cat-card 后紧跟 panel）
      // 找到 btn 在 cat-card 列表中的索引
      const cards = Array.from(document.querySelectorAll('.cat-card'));
      const idx = cards.indexOf(btn);
      // 在该卡片 DOM 之后插入 panel（注意 panel 当前可能在 grid 末尾）
      btn.parentNode.insertBefore(panel, btn.nextSibling);
      // 触发动画
      requestAnimationFrame(() => {
        panel.classList.add('show');
      });

      activeCat = id;

      // 滚动到面板位置
      setTimeout(() => {
        panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 100);
    }
  </script>

</body>
</html>

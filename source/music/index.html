<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>歌单分享 · Axtrivc's Blog</title>
  <script src="/js/standalone-theme.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--theme-body);
      color: var(--theme-text);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      min-height: 100vh;
      transition: background 0.45s ease, color 0.45s ease;
    }

    /* 顶部导航 */
    .top-nav {
      background: var(--theme-card);
      border-bottom: 1px solid var(--theme-border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      transition: background 0.45s ease, border-color 0.45s ease;
    }
    .top-nav a { color: var(--theme-secondary); text-decoration: none; font-size: 13px; transition: color 0.2s; }
    .top-nav a:hover { color: var(--theme-accent); }
    .top-nav .nav-sep { color: var(--theme-border); }
    .top-nav .nav-current { color: var(--theme-heading); font-size: 14px; font-weight: 600; }

    .music-page { max-width: 860px; margin: 0 auto; padding: 20px; }

    /* Hero - Apple/Notion 极简风 */
    .music-hero {
      text-align: left;
      padding: 48px 0 24px;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--theme-border);
    }
    .music-hero .hero-emoji {
      font-size: 28px;
      line-height: 1;
      margin-bottom: 14px;
      display: block;
    }
    .music-hero h2 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--theme-heading);
      margin-bottom: 6px;
      transition: color 0.45s ease;
    }
    .music-hero p {
      color: var(--theme-secondary);
      font-size: 14px;
      font-weight: 400;
      transition: color 0.45s ease;
    }

    /* Section 标题 - 极简风（去掉装饰条） */
    .spotify-section { margin-bottom: 36px; }
    .spotify-section h3 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--theme-secondary);
      margin-bottom: 14px;
      transition: color 0.45s ease;
    }
    .spotify-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 600px) { .spotify-grid { grid-template-columns: 1fr; } }
    .spotify-card {
      border-radius: 12px;
      overflow: hidden;
      background: var(--theme-card);
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      transition: background 0.45s ease;
    }

    /* Tab 切换 - 极简风（细线 tab，去掉胶囊背景） */
    .playlist-tabs {
      display: flex;
      gap: 24px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--theme-border);
    }
    .playlist-tab {
      padding: 10px 0;
      border: none;
      background: transparent;
      color: var(--theme-secondary);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: color 0.2s;
      position: relative;
    }
    .playlist-tab:hover { color: var(--theme-text); }
    .playlist-tab.active { color: var(--theme-heading); }
    .playlist-tab.active::after {
      content: '';
      position: absolute;
      left: 0; right: 0; bottom: -1px;
      height: 2px;
      background: var(--theme-accent);
      transition: background 0.45s ease;
    }

    /* Tab 内容 */
    .playlist-panel { display: none; }
    .playlist-panel.active { display: block; }
    /* Panel header - 极简风（缩小 icon、去掉彩色背景） */
    .panel-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .panel-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
      background: var(--theme-card);
      border: 1px solid var(--theme-border);
    }
    .panel-title {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--theme-heading);
      transition: color 0.45s ease;
    }
    .panel-desc {
      font-size: 12px;
      color: var(--theme-secondary);
      margin-top: 2px;
      transition: color 0.45s ease;
    }

    /* Spotify Embed */
    .spotify-embed {
      border-radius: 12px;
      overflow: hidden;
      background: var(--theme-card);
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      margin-bottom: 16px;
      transition: background 0.45s ease;
    }

    /* Tip */
    .music-tip {
      text-align: center;
      color: var(--theme-secondary);
      font-size: 12px;
      padding: 20px 0;
      opacity: 0.75;
    }

    /* Footer */
    .footer {
      text-align: center;
      font-size: 11px;
      color: var(--theme-secondary);
      padding: 16px 0 24px;
      opacity: 0.55;
    }
  </style>
</head>
<body>

  <div class="top-nav">
    <a href="/">首页</a>
    <span class="nav-sep">|</span>
    <span class="nav-current">🎵 歌单分享</span>
  </div>

  <div class="music-page">

    <div class="music-hero">
      <span class="hero-emoji">🎵</span>
      <h2>My Playlist</h2>
      <p>用音乐记录心情 · 点击播放，享受每一刻</p>
    </div>

    <div class="spotify-section">
      <h3>我的歌单</h3>
      <div class="spotify-grid">
        <div class="spotify-card">
          <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/6T6g0jNwBR1YLNfCO5miEo?utm_source=generator&theme=0" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>
        <div class="spotify-card">
          <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/70kdlALLmDuFcagVQznClA?utm_source=generator&theme=0" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>
      </div>
    </div>

    <div class="playlist-tabs">
      <button class="playlist-tab active" onclick="switchTab('piano', this)">🎹 纯音乐</button>
      <button class="playlist-tab" onclick="switchTab('hits', this)">🔥 热搜榜</button>
      <button class="playlist-tab" onclick="switchTab('workout', this)">🏃 运动</button>
      <button class="playlist-tab" onclick="switchTab('random', this)">🎲 随机</button>
    </div>

    <div class="playlist-panel active" id="panel-piano">
      <div class="panel-header">
        <div class="panel-icon">🎹</div>
        <div>
          <div class="panel-title">Peaceful Piano</div>
          <div class="panel-desc">安静钢琴曲，适合学习、阅读和发呆</div>
        </div>
      </div>
      <div class="spotify-embed">
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DX4sWSpwq3LiO?utm_source=generator&theme=0" width="100%" height="480" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
      </div>
      <div class="spotify-embed">
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DWZd79rJ6a7lp?utm_source=generator&theme=0" width="100%" height="380" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
      </div>
    </div>

    <div class="playlist-panel" id="panel-hits">
      <div class="panel-header">
        <div class="panel-icon">🔥</div>
        <div>
          <div class="panel-title">Today's Top Hits</div>
          <div class="panel-desc">全球最火的歌曲都在这里</div>
        </div>
      </div>
      <div class="spotify-embed">
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM5M?utm_source=generator&theme=0" width="100%" height="480" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
      </div>
      <div class="spotify-embed">
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DX9XIFQuFvzM4?utm_source=generator&theme=0" width="100%" height="380" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
      </div>
    </div>

    <div class="playlist-panel" id="panel-workout">
      <div class="panel-header">
        <div class="panel-icon">🏃</div>
        <div>
          <div class="panel-title">Workout Beats</div>
          <div class="panel-desc">燃烧卡路里的最佳伴奏</div>
        </div>
      </div>
      <div class="spotify-embed">
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DXBx6DKB6jL6R?utm_source=generator&theme=0" width="100%" height="480" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
      </div>
      <div class="spotify-embed">
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DX0XUsuxKHRJZ?utm_source=generator&theme=0" width="100%" height="380" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
      </div>
    </div>

    <div class="playlist-panel" id="panel-random">
      <div class="panel-header">
        <div class="panel-icon">🎲</div>
        <div>
          <div class="panel-title">Mint</div>
          <div class="panel-desc">随机推荐，每次都有惊喜</div>
        </div>
      </div>
      <div class="spotify-embed">
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DX4dyzvuaRJ0n?utm_source=generator&theme=0" width="100%" height="480" frameBoarder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
      </div>
      <div class="spotify-embed">
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DX1H8t5R8EiV?utm_source=generator&theme=0" width="100%" height="380" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
      </div>
    </div>

    <div class="music-tip">💡 登录 Spotify 可播放完整歌曲</div>

  </div>

  <div class="footer">数据来源：Spotify</div>

  <script>
    function switchTab(id, btn) {
      document.querySelectorAll('.playlist-tab').forEach(function(t) { t.classList.remove('active'); });
      document.querySelectorAll('.playlist-panel').forEach(function(p) { p.classList.remove('active'); });
      btn.classList.add('active');
      document.getElementById('panel-' + id).classList.add('active');
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>西班牙国家队 · 足球日报</title>
  <script src="/js/standalone-theme.js"></script>
  <script src="/js/team-dynamic.js"></script>
  <script src="/js/team-page.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/football/assets/fonts.css" />
  <link rel="stylesheet" href="/football/assets/common.css" />
</head>
<body>

  <div class="top-nav">
    <a href="/football/">← 返回日报</a>
    <span class="nav-sep">|</span>
    <span class="nav-current">🇪🇸 西班牙</span>
  </div>

  <div class="team-hero" style="background: linear-gradient(180deg, #c4000a18 0%, transparent 100%);">
    <div class="team-logo"><img src="https://a.espncdn.com/i/teamlogos/soccer/500/164.png" alt="西班牙国家队" loading="eager" onerror="this.parentNode.className='team-emoji'; this.parentNode.innerHTML='🇪🇸';" /></div>
    <div class="team-text">
      <div class="team-name">西班牙国家队</div>
      <div class="team-sub">Selección Española · 2026 世界杯冠军</div>
    </div>
  </div>

  <!-- 下一场比赛（ESPN 实时） -->
  <div class="card">
    <div class="team-section-title">⏭️ 下一场比赛</div>
    <div id="nextLoading"><div class="skel-row loading-skeleton" style="height:28px;"></div></div>
    <div id="nextContent" style="display:none;"></div>
  </div>

  <!-- 最近5场比赛（ESPN 实时） -->
  <div class="card">
    <div class="team-section-title">📅 最近5场比赛<span class="last-update" id="recentDate"></span></div>
    <div id="recentLoading">
      <div class="skel-row loading-skeleton"></div>
      <div class="skel-row loading-skeleton" style="height:24px;margin-top:8px;"></div>
    </div>
    <div id="recentContent" style="display:none;"></div>
  </div>

  <!-- 最新资讯（ESPN 新闻 + 关键词过滤，自动刷新） -->
  <div class="card news-card">
    <div class="news-section-title">
      <span>📰 最新资讯</span>
      <span class="news-section-meta">
        <span class="news-refresh-pill">⏱ <span id="refreshCountdown">5:00</span></span>
        <span id="newsLastUpdate">—</span>
      </span>
    </div>
    <div id="newsLoading">
      <div class="skel-row loading-skeleton"></div>
      <div class="skel-row loading-skeleton" style="height:24px;margin-top:8px;"></div>
    </div>
    <div class="news-list" id="newsContent" style="display:none;"></div>
  </div>

  <!-- 大名单数据（ESPN Roster API） -->
  <div class="card roster-card">
    <div class="news-section-title">
      <span>👥 2026 世界杯大名单数据</span>
      <span class="news-section-meta">
        <span class="news-refresh-pill">📊 ESPN</span>
        <span id="rosterLastUpdate">—</span>
      </span>
    </div>
    <div id="rosterLoading">
      <div class="skel-row loading-skeleton"></div>
      <div class="skel-row loading-skeleton" style="height:24px;margin-top:8px;"></div>
    </div>
    <div id="rosterContent" style="display:none;padding-bottom:8px;"></div>
  </div>

  <!-- 荣誉殿堂（历史事实） -->
  <div class="card">
    <div class="team-section-title">🏆 荣誉殿堂</div>
    <div class="trophy-row"><span class="trophy-icon">🏆</span><span class="trophy-name">世界杯冠军</span><span class="trophy-count">× 2 (2010 / 2026)</span></div>
    <div class="trophy-row"><span class="trophy-icon">🏆</span><span class="trophy-name">欧洲杯冠军</span><span class="trophy-count">× 4 (1964/2008/2012/2024)</span></div>
    <div class="trophy-row"><span class="trophy-icon">🏆</span><span class="trophy-name">欧国联冠军</span><span class="trophy-count">× 1 (2023)</span></div>
    <div class="trophy-row"><span class="trophy-icon">🥇</span><span class="trophy-name">奥运会金牌</span><span class="trophy-count">× 1 (1992)</span></div>
  </div>

  <div class="footer">数据来源：ESPN 实时接口 · 页面打开自动刷新 · 每 5 分钟更新</div>

  <script>
  document.addEventListener('DOMContentLoaded', function() {
    TeamPage.init({
      teamId: '164', league: 'fifa.world', leagueName: '世界杯', teamZh: '西班牙',
      seasons: ['2026'], standingsSeason: null, rosterSeason: '2026',
      newsLeague: 'fifa.world',
      keywords: ['spain', 'españa', 'yamal', 'lamine', 'pedri', 'rodri', 'olmo', 'williams', 'furia roja', 'de la fuente', 'delafuente']
    });
  });
  </script>

</body>
</html>

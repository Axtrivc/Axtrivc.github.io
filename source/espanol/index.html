<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>西班牙语学习中心 · Axtrivc's Blog</title>
<style>
  :root {
    --bg: #fdf8f2;
    --card: #fff;
    --accent: #e07b39;
    --accent2: #c0392b;
    --green: #27ae60;
    --red: #e74c3c;
    --text: #3d2b1f;
    --sub: #7a6152;
    --border: #e8d5c4;
    --shadow: 0 2px 12px rgba(150,90,50,0.10);
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', 'PingFang SC', sans-serif; min-height: 100vh; }

  .site-header {
    background: linear-gradient(135deg, #c0392b 0%, #e07b39 100%);
    color: #fff; padding: 28px 24px 20px; text-align: center;
  }
  .site-header h1 { font-size: 2rem; letter-spacing: 1px; }
  .site-header p { opacity: .85; margin-top: 6px; font-size: .95rem; }
  .back-link { display:inline-block; margin-bottom:10px; color:#fff; opacity:.8; text-decoration:none; font-size:.85rem; }
  .back-link:hover { opacity:1; }
  .progress-bar-wrap { background: rgba(255,255,255,0.25); border-radius: 99px; height: 8px; margin: 14px auto 0; max-width: 320px; }
  .progress-bar-inner { height: 8px; border-radius: 99px; background: #fff; transition: width .5s; }

  .level-tabs { display: flex; gap: 8px; padding: 18px 24px 0; overflow-x: auto; }
  .level-tabs::-webkit-scrollbar { display:none; }
  .level-tab {
    flex-shrink: 0; padding: 8px 20px; border-radius: 99px; border: 2px solid var(--border);
    background: var(--card); color: var(--sub); cursor: pointer; font-weight: 600; font-size: .9rem;
    transition: all .2s;
  }
  .level-tab.active, .level-tab:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
  .level-tab .badge { font-size: .72rem; margin-left: 4px; opacity: .75; }

  .main-wrap { display: flex; gap: 20px; padding: 20px 24px 40px; max-width: 1100px; margin: 0 auto; }
  .sidebar { width: 260px; flex-shrink: 0; }
  .content-area { flex: 1; min-width: 0; }

  .unit-list { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; position: sticky; top: 12px; }
  .unit-item {
    display: flex; align-items: center; gap: 12px; padding: 13px 16px;
    cursor: pointer; border-bottom: 1px solid var(--border); transition: background .15s;
  }
  .unit-item:last-child { border-bottom: none; }
  .unit-item:hover { background: #fef3ea; }
  .unit-item.active { background: #fef3ea; border-left: 3px solid var(--accent); }
  .unit-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; background: #fde8d8; }
  .unit-done .unit-icon { background: #d5f5e3; }
  .unit-text { flex: 1; min-width: 0; }
  .unit-name { font-weight: 600; font-size: .88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .unit-desc { font-size: .75rem; color: var(--sub); margin-top: 2px; }
  .unit-check { color: var(--green); font-size: .85rem; }

  .lesson-header { margin-bottom: 16px; }
  .lesson-header h2 { font-size: 1.4rem; color: var(--text); }
  .lesson-header p { color: var(--sub); margin-top: 4px; font-size: .9rem; }
  .lesson-tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .lesson-tab {
    padding: 6px 16px; border-radius: 99px; border: 1.5px solid var(--border);
    background: var(--card); color: var(--sub); cursor: pointer; font-size: .85rem; font-weight: 600; transition: all .2s;
  }
  .lesson-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .section { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; margin-bottom: 16px; }
  .section h3 { font-size: 1.05rem; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .section h3 .tag { font-size: .72rem; background: #fde8d8; color: var(--accent); border-radius: 5px; padding: 2px 7px; font-weight: 700; }
  .section .note { font-size: .88rem; color: var(--sub); line-height: 1.7; margin-top: 8px; }

  .phoneme-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
  .phoneme-card {
    background: #fdf8f2; border: 1.5px solid var(--border); border-radius: 10px;
    padding: 12px 8px; text-align: center; cursor: pointer; transition: all .2s;
  }
  .phoneme-card:hover { border-color: var(--accent); background: #fef3ea; transform: translateY(-2px); }
  .phoneme-letter { font-size: 1.6rem; font-weight: 700; color: var(--accent2); }
  .phoneme-ipa { font-size: .8rem; color: var(--sub); margin-top: 2px; }
  .phoneme-example { font-size: .75rem; color: #7a6152; margin-top: 4px; font-style: italic; }

  .grammar-table { width: 100%; border-collapse: collapse; font-size: .88rem; }
  .grammar-table th { background: #fef3ea; color: var(--accent2); padding: 8px 12px; text-align: left; border-bottom: 2px solid var(--border); }
  .grammar-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
  .grammar-table tr:last-child td { border-bottom: none; }
  .highlight-word { color: var(--accent2); font-weight: 700; }

  .dialog-box { background: #f0f7ff; border: 1.5px solid #b3d4f5; border-radius: 12px; padding: 16px; margin-bottom: 14px; }
  .dialog-line { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-start; }
  .dialog-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; margin-top: 2px; background: #e8f0fe; }
  .dialog-bubble { background: #fff; border-radius: 10px; padding: 8px 12px; font-size: .9rem; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
  .dialog-bubble .es { font-weight: 600; color: var(--accent2); display: flex; align-items: center; gap: 6px; }
  .dialog-bubble .zh { font-size: .8rem; color: var(--sub); margin-top: 2px; }

  .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
  .vocab-card {
    background: #fdf8f2; border: 1.5px solid var(--border); border-radius: 10px;
    padding: 12px; cursor: pointer; transition: all .2s; position: relative; overflow: hidden;
  }
  .vocab-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(150,90,50,.12); }
  .vocab-es { font-size: 1.1rem; font-weight: 700; color: var(--accent2); display: flex; align-items: center; gap: 6px; }
  .vocab-zh { font-size: .85rem; color: var(--sub); margin-top: 4px; }
  .vocab-example { font-size: .75rem; color: #aaa; margin-top: 6px; font-style: italic; display: none; }
  .vocab-card.flipped .vocab-example { display: block; color: var(--text); }

  .speak-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 24px; height: 24px; border-radius: 50%; border: none;
    background: #fde8d8; color: var(--accent); cursor: pointer;
    font-size: .85rem; transition: all .2s; flex-shrink: 0;
  }
  .speak-btn:hover { background: var(--accent); color: #fff; transform: scale(1.1); }

  .tts-bar {
    display: flex; align-items: center; gap: 10px; padding: 8px 24px;
    background: #fff8f3; border-bottom: 1px solid var(--border);
    font-size: .82rem; color: var(--sub);
  }
  .tts-bar label { font-weight: 600; color: var(--text); }
  .speed-btn {
    padding: 4px 12px; border-radius: 99px; border: 1.5px solid var(--border);
    background: var(--card); cursor: pointer; font-size: .8rem; font-weight: 600;
    color: var(--sub); transition: all .2s;
  }
  .speed-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .quiz-progress { font-size: .82rem; color: var(--sub); margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
  .quiz-progress-track { background: var(--border); border-radius: 99px; height: 6px; flex: 1; margin-left: 10px; }
  .quiz-progress-fill { background: var(--accent); border-radius: 99px; height: 6px; transition: width .4s; }
  .quiz-question { font-size: 1.1rem; font-weight: 600; margin-bottom: 18px; line-height: 1.5; }
  .quiz-tip { font-size: .82rem; color: var(--sub); margin-bottom: 10px; }
  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .option-btn {
    padding: 12px 10px; border-radius: 10px; border: 2px solid var(--border);
    background: var(--card); cursor: pointer; font-size: .9rem; text-align: left;
    transition: all .2s; display: flex; align-items: center; gap: 8px;
  }
  .option-btn:hover:not(:disabled) { border-color: var(--accent); background: #fef3ea; }
  .option-btn.correct { border-color: var(--green); background: #eafaf1; color: var(--green); }
  .option-btn.wrong { border-color: var(--red); background: #fdf0ee; color: var(--red); }
  .option-letter { width: 24px; height: 24px; border-radius: 50%; background: var(--border); display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: .8rem; flex-shrink: 0; }
  .correct .option-letter { background: var(--green); color: #fff; }
  .wrong .option-letter { background: var(--red); color: #fff; }

  .fill-input {
    width: 100%; padding: 12px 14px; border-radius: 10px; border: 2px solid var(--border);
    font-size: 1rem; outline: none; transition: border .2s; background: var(--bg);
    color: var(--text); margin-bottom: 12px;
  }
  .fill-input:focus { border-color: var(--accent); }
  .fill-input.correct { border-color: var(--green); background: #eafaf1; }
  .fill-input.wrong { border-color: var(--red); background: #fdf0ee; }

  .quiz-feedback { padding: 12px 16px; border-radius: 10px; margin-bottom: 14px; font-weight: 600; font-size: .9rem; display: none; }
  .quiz-feedback.show { display: block; }
  .quiz-feedback.correct { background: #eafaf1; color: var(--green); border: 1.5px solid var(--green); }
  .quiz-feedback.wrong { background: #fdf0ee; color: var(--red); border: 1.5px solid var(--red); }

  .btn { padding: 10px 24px; border-radius: 99px; border: none; cursor: pointer; font-weight: 700; font-size: .95rem; transition: all .2s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #c9672a; transform: translateY(-1px); }
  .btn-secondary { background: var(--border); color: var(--sub); }
  .btn-secondary:hover { background: #d9c3b0; }

  .quiz-result { text-align: center; padding: 30px 20px; }
  .result-score { font-size: 3rem; font-weight: 800; color: var(--accent); }
  .result-msg { font-size: 1.1rem; margin-top: 8px; color: var(--text); }
  .result-stars { font-size: 2rem; margin: 12px 0; }

  .site-footer { text-align:center; padding:20px; color:var(--sub); font-size:.8rem; opacity:.6; }

  @media (max-width: 700px) {
    .main-wrap { flex-direction: column; padding: 14px 12px 40px; }
    .sidebar { width: 100%; }
    .unit-list { position: static; }
    .options-grid { grid-template-columns: 1fr; }
    .phoneme-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); }
    .vocab-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  }
</style>
</head>
<body>

<div class="site-header">
  <a href="/-Axtrivc-.github.io/" class="back-link">&larr; 返回博客</a>
  <h1>🇪🇸 西班牙语学习中心</h1>
  <p>从零基础到 C1 &middot; 发音 &middot; 语法 &middot; 词汇 &middot; 对话 &middot; 习题</p>
  <div class="progress-bar-wrap">
    <div class="progress-bar-inner" id="globalProgress" style="width:0%"></div>
  </div>
  <p style="font-size:.78rem;margin-top:6px;opacity:.75" id="globalProgressText">加载中...</p>
</div>

<div class="tts-bar">
  <label>🔊 语速：</label>
  <button class="speed-btn" onclick="setSpeed(0.6,this)">慢速</button>
  <button class="speed-btn active" onclick="setSpeed(0.9,this)">正常</button>
  <button class="speed-btn" onclick="setSpeed(1.2,this)">快速</button>
  <span style="margin-left:auto;opacity:.65;font-size:.78rem">点击 🔊 听发音</span>
</div>

<div class="level-tabs" id="levelTabs"></div>

<div class="main-wrap">
  <div class="sidebar"><div class="unit-list" id="unitList"></div></div>
  <div class="content-area" id="contentArea">
    <div class="lesson-header">
      <h2 id="lessonTitle">加载中...</h2>
      <p id="lessonDesc"></p>
    </div>
    <div class="lesson-tabs">
      <button class="lesson-tab active" onclick="switchTab('learn',this)">📖 学习</button>
      <button class="lesson-tab" onclick="switchTab('quiz',this)">✏️ 测验</button>
    </div>
    <div id="tabContent"></div>
  </div>
</div>

<div class="site-footer">&copy; Axtrivc &middot; 🇪🇸 西班牙语学习中心 &middot; A1&rarr;C1 完整体系</div>

<!-- Load course data files -->
<script src="data/courses-a1.js"></script>
<script src="data/courses-a2.js"></script>
<script src="data/courses-b1.js"></script>
<script src="data/courses-b2.js"></script>
<script src="data/courses-c1.js"></script>

<script>
// ════════════════════════════════════════════════════════════
// App State & Logic
// ════════════════════════════════════════════════════════════

let ttsRate = 0.9;
let currentLevel = 'A1';
let currentUnitIdx = 0;
let currentTab = 'learn';
let quizState = { idx: 0, score: 0, answered: false };

// Course registry
const COURSE_MAP = {
  A1: typeof COURSES_A1 !== 'undefined' ? COURSES_A1 : null,
  A2: typeof COURSES_A2 !== 'undefined' ? COURSES_A2 : null,
  B1: typeof COURSES_B1 !== 'undefined' ? COURSES_B1 : null,
  B2: typeof COURSES_B2 !== 'undefined' ? COURSES_B2 : null,
  C1: typeof COURSES_C1 !== 'undefined' ? COURSES_C1 : null,
};

function getAllLevels() { return ['A1','A2','B1','B2','C1']; }
function getLevelCourse(lv) { return COURSE_MAP[lv]; }
function getProgress() {
  let total = 0, done = 0;
  getAllLevels().forEach(lv => {
    const c = getLevelCourse(lv);
    if (c) { c.units.forEach(u => { total++; if(u.done) done++; }); }
  });
  return { total, done, pct: total ? Math.round(done/total*100) : 0 };
}

// ── TTS ──
function setSpeed(r, btn) {
  ttsRate = r;
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
}
function speak(text, lang) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang || 'es-ES';
  u.rate = ttsRate;
  window.speechSynthesis.speak(u);
}
function speakBtn(text) {
  return '<button class="speak-btn" onclick="speak(\'' + text.replace(/'/g,"\\'") + '\')" title="播放发音">🔊</button>';
}

// ── Level Tabs ──
function renderLevelTabs() {
  const el = document.getElementById('levelTabs');
  let html = '';
  getAllLevels().forEach(lv => {
    const c = getLevelCourse(lv);
    if (!c) return;
    const doneCount = c.units.filter(u=>u.done).length;
    html += '<button class="level-tab' + (lv===currentLevel?' active':'') + '" onclick="switchLevel(\'' + lv + '\')">';
    html += lv + ' <span class="badge">' + (c.title||lv) + '</span>';
    if (doneCount > 0) html += ' <span class="badge">✓' + doneCount + '</span>';
    html += '</button>';
  });
  el.innerHTML = html;
}

function switchLevel(lv) {
  currentLevel = lv;
  currentUnitIdx = 0;
  currentTab = 'learn';
  renderAll();
}

// ── Unit Sidebar ──
function renderUnitList() {
  const el = document.getElementById('unitList');
  const c = getLevelCourse(currentLevel);
  if (!c) { el.innerHTML = '<div style="padding:20px;color:#999">课程加载中...</div>'; return; }
  let html = '';
  c.units.forEach((u, i) => {
    html += '<div class="unit-item' + (i===currentUnitIdx?' active':'') + (u.done?' unit-done':'') + '" onclick="selectUnit(' + i + ')">';
    html += '<div class="unit-icon">' + u.icon + '</div>';
    html += '<div class="unit-text"><div class="unit-name">' + u.name + '</div>';
    html += '<div class="unit-desc">' + u.desc + '</div></div>';
    if (u.done) html += '<span class="unit-check">✓</span>';
    html += '</div>';
  });
  el.innerHTML = html;
}

function selectUnit(idx) {
  currentUnitIdx = idx;
  currentTab = 'learn';
  renderUnitList();
  renderContent();
  // Reset lesson tabs
  document.querySelectorAll('.lesson-tab').forEach((t,i) => t.classList.toggle('active', i===0));
}

// ── Tabs ──
function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.lesson-tab').forEach(t => t.classList.remove('active'));
  if(btn) btn.classList.add('active');
  renderContent();
}

// ── Content Rendering ──
function renderContent() {
  const c = getLevelCourse(currentLevel);
  if (!c || !c.units[currentUnitIdx]) return;
  const u = c.units[currentUnitIdx];
  document.getElementById('lessonTitle').textContent = u.icon + ' ' + u.name;
  document.getElementById('lessonDesc').textContent = u.desc;

  const container = document.getElementById('tabContent');
  if (currentTab === 'learn') {
    container.innerHTML = renderLearn(u);
  } else if (currentTab === 'quiz') {
    quizState = { idx: 0, score: 0, answered: false };
    container.innerHTML = renderQuiz(u);
  }
}

function renderLearn(u) {
  const L = u.learn;
  if (!L) return '<div class="section"><p>暂无学习内容</p></div>';
  let html = '';

  // Phonetics
  if (L.phonetics && L.phonetics.length) {
    html += '<div class="section"><h3>🔤 发音表 <span class="tag">Phonetics</span></h3>';
    html += '<div class="phoneme-grid">';
    L.phonetics.forEach(p => {
      html += '<div class="phoneme-card" onclick="speak(\'' + (p.example||p.letter).split(' ')[0].replace(/'/g,"\\'") + '\')">';
      html += '<div class="phoneme-letter">' + p.letter + '</div>';
      html += '<div class="phoneme-ipa">' + p.ipa + '</div>';
      html += '<div class="phoneme-example">' + (p.example||'') + '</div>';
      html += '</div>';
    });
    html += '</div></div>';
  }

  // Dialogue
  if (L.dialogue && L.dialogue.length) {
    html += '<div class="section"><h3>💬 对话练习 <span class="tag">Dialogue</span></h3>';
    html += '<div class="dialog-box">';
    L.dialogue.forEach(d => {
      const avatar = d.avatar || (d.role==='A'?'👦':'👧');
      const esText = d.es || d.text || '';
      const zhText = d.zh || '';
      html += '<div class="dialog-line">';
      html += '<div class="dialog-avatar">' + avatar + '</div>';
      html += '<div class="dialog-bubble">';
      html += '<div class="es">' + esText + ' ' + speakBtn(esText.replace(/'/g,"\\'")) + '</div>';
      if (zhText) html += '<div class="zh">' + zhText + '</div>';
      html += '</div></div>';
    });
    html += '</div></div>';
  }

  // Grammar
  if (L.grammar && L.grammar.rows && L.grammar.rows.length) {
    html += '<div class="section"><h3>📝 语法 <span class="tag">Grammar</span></h3>';
    html += '<table class="grammar-table"><thead><tr>';
    L.grammar.rows[0].forEach(h => html += '<th>' + h + '</th>');
    html += '</tr></thead><tbody>';
    for (let i = 1; i < L.grammar.rows.length; i++) {
      html += '<tr>';
      L.grammar.rows[i].forEach(cell => html += '<td>' + cell + '</td>');
      html += '</tr>';
    }
    html += '</tbody></table>';
    if (L.grammar.note) html += '<div class="note">' + L.grammar.note + '</div>';
    html += '</div>';
  }

  // Note (standalone)
  if (L.note && !L.grammar) {
    html += '<div class="section"><h3>💡 要点 <span class="tag">Note</span></h3>';
    html += '<div class="note">' + L.note + '</div></div>';
  }

  // Vocab
  if (L.vocab && L.vocab.length) {
    html += '<div class="section"><h3>📖 词汇 <span class="tag">Vocabulary</span></h3>';
    html += '<div class="vocab-grid">';
    L.vocab.forEach(v => {
      html += '<div class="vocab-card" onclick="this.classList.toggle(\'flipped\')">';
      html += '<div class="vocab-es">' + v.es + ' ' + speakBtn(v.es.replace(/'/g,"\\'")) + '</div>';
      html += '<div class="vocab-zh">' + v.zh + '</div>';
      html += '<div class="vocab-example">' + (v.ex||'') + '</div>';
      html += '</div>';
    });
    html += '</div></div>';
  }

  return html;
}

// ── Quiz ──
function renderQuiz(u) {
  if (!u.quiz || !u.quiz.length) return '<div class="section"><p>暂无测验题</p></div>';
  return renderQuizQuestion(u);
}

function renderQuizQuestion(u) {
  const q = u.quiz[quizState.idx];
  if (!q) return renderQuizResult(u);

  const total = u.quiz.length;
  const num = quizState.idx + 1;
  const pctDone = Math.round(quizState.idx / total * 100);

  let html = '<div class="quiz-progress"><span>' + num + ' / ' + total + '</span>';
  html += '<div class="quiz-progress-track"><div class="quiz-progress-fill" style="width:' + pctDone + '%"></div></div>';
  html += '<span>' + quizState.score + ' 分</span></div>';

  html += '<div class="section">';
  if (q.type === 'choice') {
    html += '<div class="quiz-question">' + q.q + '</div>';
    html += '<div class="options-grid">';
    const letters = ['A','B','C','D'];
    q.options.forEach((opt, i) => {
      html += '<button class="option-btn" id="opt-' + i + '" onclick="checkChoice(' + i + ',' + q.answer + ',\'' + (q.explain||'').replace(/'/g,"\\'") + '\')">';
      html += '<span class="option-letter">' + letters[i] + '</span> ' + opt;
      html += '</button>';
    });
    html += '</div>';
  } else if (q.type === 'fill') {
    html += '<div class="quiz-question">' + q.q + '</div>';
    html += '<input class="fill-input" id="fillInput" type="text" placeholder="输入你的答案..." onkeydown="if(event.key===\'Enter\')checkFill(this,\'' + q.answer.replace(/'/g,"\\'") + '\',\'' + (q.explain||'').replace(/'/g,"\\'") + '\')">';
    html += '<div style="display:flex;gap:10px"><button class="btn btn-primary" onclick="checkFill(document.getElementById(\'fillInput\'),\'' + q.answer.replace(/'/g,"\\'") + '\',\'' + (q.explain||'').replace(/'/g,"\\'") + '\')">提交</button></div>';
  }
  html += '<div class="quiz-feedback" id="quizFeedback"></div>';
  html += '<div id="nextBtnWrap" style="display:none"><button class="btn btn-primary" onclick="nextQuestion()">下一题 →</button></div>';
  html += '</div>';

  quizState.answered = false;
  return html;
}

function checkChoice(selected, correct, explain) {
  if (quizState.answered) return;
  quizState.answered = true;

  document.getElementById('opt-' + selected).classList.add(selected === correct ? 'correct' : 'wrong');
  if (selected !== correct) document.getElementById('opt-' + correct).classList.add('correct');

  const fb = document.getElementById('quizFeedback');
  if (selected === correct) {
    quizState.score += 20;
    fb.className = 'quiz-feedback show correct';
    fb.textContent = '✅ 正确！' + (explain ? ' ' + explain : '');
  } else {
    fb.className = 'quiz-feedback show wrong';
    fb.textContent = '❌ 错误。' + (explain ? ' ' + explain : '');
  }
  document.getElementById('nextBtnWrap').style.display = 'block';

  // Disable all options
  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
}

function checkFill(input, answer, explain) {
  if (quizState.answered) return;
  const userAns = input.value.trim().toLowerCase();
  const correctAns = answer.toLowerCase();
  if (!userAns) return;

  quizState.answered = true;
  const fb = document.getElementById('quizFeedback');

  // Fuzzy match: allow small differences
  const isCorrect = userAns === correctAns ||
    userAns.replace(/\s+/g,'') === correctAns.replace(/\s+/g,'') ||
    correctAns.includes(userAns) && userAns.length >= correctAns.length * 0.6;

  input.classList.add(isCorrect ? 'correct' : 'wrong');
  if (isCorrect) {
    quizState.score += 20;
    fb.className = 'quiz-feedback show correct';
    fb.textContent = '✅ 正确！答案：' + answer + (explain ? ' ' + explain : '');
  } else {
    fb.className = 'quiz-feedback show wrong';
    fb.textContent = '❌ 错误。正确答案：' + answer + (explain ? ' ' + explain : '');
  }
  document.getElementById('nextBtnWrap').style.display = 'block';
  input.disabled = true;
}

function nextQuestion() {
  quizState.idx++;
  const c = getLevelCourse(currentLevel);
  const u = c.units[currentUnitIdx];
  const container = document.getElementById('tabContent');
  if (quizState.idx >= u.quiz.length) {
    container.innerHTML = renderQuizResult(u);
  } else {
    container.innerHTML = renderQuizQuestion(u);
  }
}

function renderQuizResult(u) {
  const total = u.quiz.length * 20;
  const score = quizState.score;
  const pct = Math.round(score / total * 100);
  let stars = '';
  if (pct >= 90) stars = '⭐⭐⭐';
  else if (pct >= 70) stars = '⭐⭐';
  else if (pct >= 40) stars = '⭐';
  else stars = '😅';

  // Mark unit as done if score >= 60
  if (pct >= 60) {
    u.done = true;
    saveProgress();
    renderUnitList();
    updateGlobalProgress();
  }

  let msg = '';
  if (pct >= 90) msg = '太棒了！完美掌握！';
  else if (pct >= 70) msg = '不错！继续加油！';
  else if (pct >= 60) msg = '及格了，再复习一下会更好！';
  else msg = '需要多练习，别灰心！';

  let html = '<div class="section"><div class="quiz-result">';
  html += '<div class="result-score">' + score + '</div>';
  html += '<div class="result-msg">' + msg + '</div>';
  html += '<div class="result-stars">' + stars + '</div>';
  html += '<div style="margin-top:20px;display:flex;gap:10px;justify-content:center">';
  html += '<button class="btn btn-secondary" onclick="switchTab(\'learn\',document.querySelectorAll(\'.lesson-tab\')[0])">📖 重新学习</button>';
  html += '<button class="btn btn-primary" onclick="switchTab(\'quiz\',document.querySelectorAll(\'.lesson-tab\')[1])">✏️ 再测一次</button>';
  html += '</div></div></div>';
  return html;
}

// ── Progress Persistence ──
function saveProgress() {
  const data = {};
  getAllLevels().forEach(lv => {
    const c = getLevelCourse(lv);
    if (c) {
      data[lv] = c.units.map(u => u.done ? 1 : 0);
    }
  });
  try { localStorage.setItem('espanol_progress', JSON.stringify(data)); } catch(e) {}
}

function loadProgress() {
  try {
    const raw = localStorage.getItem('espanol_progress');
    if (!raw) return;
    const data = JSON.parse(raw);
    getAllLevels().forEach(lv => {
      const c = getLevelCourse(lv);
      if (c && data[lv]) {
        data[lv].forEach((d, i) => { if (c.units[i]) c.units[i].done = !!d; });
      }
    });
  } catch(e) {}
}

function updateGlobalProgress() {
  const p = getProgress();
  document.getElementById('globalProgress').style.width = p.pct + '%';
  document.getElementById('globalProgressText').textContent =
    '总进度 ' + p.pct + '% · ' + p.done + '/' + p.total + ' 单元已完成';
  saveProgress();
}

// ── Init ──
function renderAll() {
  renderLevelTabs();
  renderUnitList();
  renderContent();
  updateGlobalProgress();
}

loadProgress();
renderAll();
</script>

</html>
